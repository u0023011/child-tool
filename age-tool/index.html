<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>幼兒年齡與檢核表階段計算工具</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8b6f47">

  <link rel="apple-touch-icon" href="/icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="幼兒檢核">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    body {
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f7f3ec;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 860px;
      margin: auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      color: #6b4f35;
      font-size: 26px;
      margin-bottom: 8px;
    }

    h2 {
      color: #6b4f35;
      font-size: 21px;
      margin-top: 8px;
      border-left: 6px solid #c9a46a;
      padding-left: 10px;
    }

    .note {
      text-align: center;
      color: #777;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .tab-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .tab-button {
      padding: 14px 10px;
      border: 2px solid #c9a46a;
      background: #fffaf0;
      color: #6b4f35;
      border-radius: 12px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    .tab-button.active {
      background: #8b6f47;
      color: white;
      border-color: #8b6f47;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .block {
      background: #fbfaf7;
      border: 1px solid #eadcc6;
      border-radius: 14px;
      padding: 18px;
      margin-top: 18px;
    }

    label {
      display: block;
      margin-top: 16px;
      font-weight: bold;
      color: #4b3b2a;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
      background: #fff;
    }

    .checkbox-row,
    .radio-row {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .checkbox-row input,
    .radio-row input {
      width: auto;
      margin-top: 0;
    }

    .checkbox-row label,
    .radio-row label {
      margin: 0;
      font-weight: normal;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 10px;
    }

    .age-row {
      display: grid;
      grid-template-columns: 1fr 40px 1fr 40px 1fr 40px;
      gap: 8px;
      align-items: center;
      margin-top: 6px;
    }

    .week-row {
      display: grid;
      grid-template-columns: 1fr 40px 1fr 40px;
      gap: 8px;
      align-items: center;
      margin-top: 6px;
    }

    .age-row input,
    .week-row input {
      margin-top: 0;
      text-align: center;
    }

    .age-row span,
    .week-row span {
      font-weight: bold;
      color: #4b3b2a;
      text-align: center;
    }

    button.calculate-button {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: #8b6f47;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    button.calculate-button:hover {
      background: #755b39;
    }

    .result {
      margin-top: 24px;
      padding: 18px;
      background: #fff8ec;
      border-left: 6px solid #c9a46a;
      border-radius: 12px;
      line-height: 1.8;
      font-size: 17px;
    }

    .result-title {
      font-size: 20px;
      font-weight: bold;
      color: #4b3b2a;
      margin-bottom: 14px;
    }

    .result-section {
      background: #fffdf8;
      border: 1px solid #edd9b8;
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 14px;
    }

    .result-section-title {
      font-size: 18px;
      font-weight: bold;
      color: #6b4f35;
      margin-bottom: 10px;
    }

    .result-line {
      margin: 8px 0;
      line-height: 1.8;
      word-break: break-word;
    }

    .result-line strong {
      color: #4b3b2a;
    }

    .result-note {
      margin-top: 12px;
      padding: 12px 14px;
      background: #fff5e7;
      border-radius: 10px;
      color: #7a4d20;
      font-weight: bold;
      line-height: 1.7;
    }

    .warning {
      color: #b85c38;
      font-weight: bold;
      line-height: 1.7;
    }

    .hidden {
      display: none;
    }

    .small {
      font-size: 14px;
      color: #777;
      line-height: 1.6;
      margin-top: 16px;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .container {
        padding: 16px;
      }

      h1 {
        font-size: 23px;
      }

      h2 {
        font-size: 19px;
      }

      .tab-buttons {
        grid-template-columns: 1fr;
      }

      .tab-button {
        font-size: 16px;
      }

      .age-row {
        grid-template-columns: 1fr 32px 1fr 32px 1fr 32px;
        gap: 6px;
      }

      .week-row {
        grid-template-columns: 1fr 32px 1fr 32px;
        gap: 6px;
      }

      .radio-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }

      .result {
        padding: 16px;
        font-size: 16px;
      }

      .result-title {
        font-size: 18px;
      }

      .result-section-title {
        font-size: 17px;
      }
    }
  </style>

<body>
  <div class="container">
    <h1>幼兒年齡與檢核表階段計算工具</h1>

    <div class="note">
      可計算實際年齡、早產兒矯正年齡，並依年齡區間判斷檢核表。<br>
      也可依生日與檢核年齡，回推檢核日期。
    </div>

    <div class="tab-buttons">
      <button class="tab-button active" onclick="showTab('tab1', this)">功能一：年齡與檢核表判斷</button>
      <button class="tab-button" onclick="showTab('tab2', this)">功能二：回推檢核日期</button>
    </div>

    <div id="tab1" class="tab-content active">
      <div class="block">
        <h2>功能一：年齡與檢核表判斷</h2>

        <label for="birthDate">幼兒出生日期</label>
        <div class="date-wrap">
          <input type="text" id="birthDate" inputmode="numeric" placeholder="例：1150709">
          <button type="button" class="date-picker-btn" onclick="openRocPicker('birthDate')" aria-label="選擇日期">📅</button>
        </div>

        <label for="checkDate">檢核日期</label>
        <div class="date-wrap">
          <input type="text" id="checkDate" inputmode="numeric" placeholder="例：1150709">
          <button type="button" class="date-picker-btn" onclick="openRocPicker('checkDate')" aria-label="選擇日期">📅</button>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="isPreterm" onchange="togglePreterm()">
          <label for="isPreterm">是否為早產兒</label>
        </div>

        <div id="pretermBox" class="hidden">
          <label>矯正年齡計算方式</label>

          <div class="radio-row">
            <div class="radio-option">
              <input type="radio" id="dueDateMode" name="pretermMode" value="dueDate" checked onchange="togglePretermMode()">
              <label for="dueDateMode">直接輸入預產期</label>
            </div>

            <div class="radio-option">
              <input type="radio" id="gestationMode" name="pretermMode" value="gestation" onchange="togglePretermMode()">
              <label for="gestationMode">用出生週數推算預產期</label>
            </div>
          </div>

          <div id="dueDateBox">
            <label for="dueDate">預產期</label>
            <div class="date-wrap">
          <input type="text" id="dueDate" inputmode="numeric" placeholder="例：1150709">
          <button type="button" class="date-picker-btn" onclick="openRocPicker('dueDate')" aria-label="選擇日期">📅</button>
        </div>
          </div>

          <div id="gestationBox" class="hidden">
            <label>出生週數</label>
            <div class="week-row">
              <input type="number" id="gestationWeeks" min="0">
              <span>週</span>

              <input type="number" id="gestationDays" min="0" max="6">
              <span>天</span>
            </div>
          </div>
        </div>

        <button class="calculate-button" onclick="calculate()">開始計算</button>

        <div id="result" class="result hidden"></div>
      </div>
    </div>

    <div id="tab2" class="tab-content">
      <div class="block">
        <h2>功能二：回推檢核日期</h2>

        <label for="reverseBirthDate">幼兒出生日期</label>
        <div class="date-wrap">
          <input type="text" id="reverseBirthDate" inputmode="numeric" placeholder="例：1150709">
          <button type="button" class="date-picker-btn" onclick="openRocPicker('reverseBirthDate')" aria-label="選擇日期">📅</button>
        </div>

        <label>檢核年齡</label>
        <div class="age-row">
          <input type="number" id="reverseYears" min="0">
          <span>歲</span>

          <input type="number" id="reverseMonths" min="0">
          <span>月</span>

          <input type="number" id="reverseDays" min="0">
          <span>天</span>
        </div>

        <button class="calculate-button" onclick="reverseCalculate()">回推檢核日期</button>

        <div id="reverseResult" class="result hidden"></div>
      </div>
    </div>

    <div class="small">
      ※ 日期可輸入民國或西元，亦可使用旁邊日期選擇器。本工具為輔助計算用途，實際檢核表版本與使用階段，仍建議依中心或主管機關公告版本辦理。
    </div>
  </div>

  <script>
    const stages = [
      { name: "4個月檢核表", rangeText: "3個月16天～5個月15天", min: { years: 0, months: 3, days: 16 }, max: { years: 0, months: 5, days: 15 } },
      { name: "6個月檢核表", rangeText: "5個月16天～8個月15天", min: { years: 0, months: 5, days: 16 }, max: { years: 0, months: 8, days: 15 } },
      { name: "9個月檢核表", rangeText: "8個月16天～11個月15天", min: { years: 0, months: 8, days: 16 }, max: { years: 0, months: 11, days: 15 } },
      { name: "1歲檢核表", rangeText: "11個月16天～1歲2個月15天", min: { years: 0, months: 11, days: 16 }, max: { years: 1, months: 2, days: 15 } },
      { name: "1歲3個月檢核表", rangeText: "1歲2個月16天～1歲5個月15天", min: { years: 1, months: 2, days: 16 }, max: { years: 1, months: 5, days: 15 } },
      { name: "1歲6個月檢核表", rangeText: "1歲5個月16天～1歲11個月15天", min: { years: 1, months: 5, days: 16 }, max: { years: 1, months: 11, days: 15 } },
      { name: "2歲檢核表", rangeText: "1歲11個月16天～2歲5個月15天", min: { years: 1, months: 11, days: 16 }, max: { years: 2, months: 5, days: 15 } },
      { name: "2歲6個月檢核表", rangeText: "2歲5個月16天～2歲11個月15天", min: { years: 2, months: 5, days: 16 }, max: { years: 2, months: 11, days: 15 } },
      { name: "3歲檢核表", rangeText: "2歲11個月16天～3歲5個月15天", min: { years: 2, months: 11, days: 16 }, max: { years: 3, months: 5, days: 15 } },
      { name: "3歲6個月檢核表", rangeText: "3歲5個月16天～3歲11個月15天", min: { years: 3, months: 5, days: 16 }, max: { years: 3, months: 11, days: 15 } },
      { name: "4歲檢核表", rangeText: "3歲11個月16天～4歲11個月15天", min: { years: 3, months: 11, days: 16 }, max: { years: 4, months: 11, days: 15 } },
      { name: "5歲檢核表", rangeText: "4歲11個月16天～5歲11個月15天", min: { years: 4, months: 11, days: 16 }, max: { years: 5, months: 11, days: 15 } },
      { name: "6歲檢核表", rangeText: "5歲11個月16天～6歲11個月15天", min: { years: 5, months: 11, days: 16 }, max: { years: 6, months: 11, days: 15 } }
    ];

    function showTab(tabId, button) {
      document.querySelectorAll(".tab-content").forEach(content => content.classList.remove("active"));
      document.querySelectorAll(".tab-button").forEach(btn => btn.classList.remove("active"));
      document.getElementById(tabId).classList.add("active");
      button.classList.add("active");
    }

    function togglePreterm() {
      const isPreterm = document.getElementById("isPreterm").checked;
      document.getElementById("pretermBox").classList.toggle("hidden", !isPreterm);
    }

    function togglePretermMode() {
      const mode = document.querySelector('input[name="pretermMode"]:checked').value;
      document.getElementById("dueDateBox").classList.toggle("hidden", mode !== "dueDate");
      document.getElementById("gestationBox").classList.toggle("hidden", mode !== "gestation");
    }

    function detectCalendarType(value) {
      if (!value) return null;
      let clean = String(value).trim();

      if (/^\d{7}$/.test(clean)) return "roc";
      if (/^\d{8}$/.test(clean)) return "western";
      if (/^\d{6}$/.test(clean)) return "roc";

      const parts = clean.replace(/[.\-]/g, "/").split("/");
      if (parts.length === 3) {
        const year = Number(parts[0]);
        if (year < 1911) return "roc";
        return "western";
      }

      return null;
    }

    function parseDateInfo(value) {
      if (!value) return null;

      value = String(value).trim();

      let year, month, day;
      const calendar = detectCalendarType(value);

      if (/^\d{7}$/.test(value)) {
        year = Number(value.substring(0, 3)) + 1911;
        month = Number(value.substring(3, 5));
        day = Number(value.substring(5, 7));
      } else if (/^\d{6}$/.test(value)) {
        year = Number(value.substring(0, 3)) + 1911;
        month = Number(value.substring(3, 4));
        day = Number(value.substring(4, 6));
      } else if (/^\d{8}$/.test(value)) {
        year = Number(value.substring(0, 4));
        month = Number(value.substring(4, 6));
        day = Number(value.substring(6, 8));
      } else {
        const parts = value.replace(/[.\-]/g, "/").split("/");

        if (parts.length !== 3) return null;

        year = Number(parts[0]);
        month = Number(parts[1]);
        day = Number(parts[2]);

        if (year < 1911) {
          year += 1911;
        }
      }

      if (!year || !month || !day || !calendar) return null;

      const date = new Date(year, month - 1, day);

      if (
        date.getFullYear() !== year ||
        date.getMonth() !== month - 1 ||
        date.getDate() !== day
      ) {
        return null;
      }

      return {
        date: date,
        calendar: calendar
      };
    }

    function calculateAge(startDate, endDate) {
      let years = endDate.getFullYear() - startDate.getFullYear();
      let months = endDate.getMonth() - startDate.getMonth();
      let days = endDate.getDate() - startDate.getDate();

      if (days < 0) {
        months--;
        const previousMonth = new Date(endDate.getFullYear(), endDate.getMonth(), 0);
        days += previousMonth.getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      return { years, months, days };
    }

    function compareAge(a, b) {
      if (a.years !== b.years) return a.years - b.years;
      if (a.months !== b.months) return a.months - b.months;
      return a.days - b.days;
    }

    function isAgeInRange(age, min, max) {
      return compareAge(age, min) >= 0 && compareAge(age, max) <= 0;
    }

    function getStageByAge(age) {
      const found = stages.find(stage => isAgeInRange(age, stage.min, stage.max));

      if (!found) {
        return {
          name: "目前未落在本檢核表適用範圍內",
          rangeText: "本工具目前支援 3個月16天～6歲11個月15天"
        };
      }

      return found;
    }

    function formatAge(age) {
      return `${age.years}歲 ${age.months}個月 ${age.days}天`;
    }

    function formatDateByCalendar(date, calendar) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");

      if (calendar === "roc") {
        return `${year - 1911}/${month}/${day}`;
      }

      return `${year}/${month}/${day}`;
    }

    function addDays(date, days) {
      const newDate = new Date(date);
      newDate.setDate(newDate.getDate() + days);
      return newDate;
    }

    function calculateDueDateFromGestation(birthDate, weeks, days) {
      const gestationTotalDays = weeks * 7 + days;
      const fullTermDays = 40 * 7;
      const daysToDueDate = fullTermDays - gestationTotalDays;
      return addDays(birthDate, daysToDueDate);
    }

    function section(title, lines) {
      return `
        <div class="result-section">
          <div class="result-section-title">${title}</div>
          ${lines.join("")}
        </div>
      `;
    }

    function line(label, value) {
      return `<div class="result-line"><strong>${label}：</strong>${value}</div>`;
    }

    function getPretermDueDate(birthInfo) {
      const mode = document.querySelector('input[name="pretermMode"]:checked').value;

      if (mode === "dueDate") {
        const dueDateInfo = parseDateInfo(document.getElementById("dueDate").value);

        return {
          dueDate: dueDateInfo ? dueDateInfo.date : null,
          calendar: dueDateInfo ? dueDateInfo.calendar : birthInfo.calendar,
          message: dueDateInfo ? "使用者輸入" : "",
          error: dueDateInfo ? "" : "請確認預產期是否正確。"
        };
      }

      const weeksInput = document.getElementById("gestationWeeks").value;
      const daysInput = document.getElementById("gestationDays").value;
      const weeks = Number(weeksInput || 0);
      const days = Number(daysInput || 0);

      if (weeksInput === "" && daysInput === "") {
        return {
          dueDate: null,
          calendar: birthInfo.calendar,
          message: "",
          error: "請輸入出生週數。"
        };
      }

      if (weeks < 0 || days < 0 || days > 6) {
        return {
          dueDate: null,
          calendar: birthInfo.calendar,
          message: "",
          error: "出生週數的天數請輸入 0～6 天。"
        };
      }

      if (weeks > 45) {
        return {
          dueDate: null,
          calendar: birthInfo.calendar,
          message: "",
          error: "出生週數看起來過大，請確認是否輸入正確。"
        };
      }

      const dueDate = calculateDueDateFromGestation(birthInfo.date, weeks, days);

      let message = `以40週推算`;

      if (weeks > 40 || (weeks === 40 && days > 0)) {
        message += `<br><span class="warning">提醒：出生週數已超過 40週0天，請確認資料是否正確。</span>`;
      } else if (weeks >= 37) {
        message += `<br><span class="warning">提醒：出生週數已達 37週以上，通常不屬於早產兒；若仍需計算矯正年齡，系統仍會協助計算。</span>`;
      }

      return {
        dueDate: dueDate,
        calendar: birthInfo.calendar,
        message: message,
        error: ""
      };
    }

    function calculateOnlyDueDateIfNeeded(birthInfo, checkInfo, isPreterm, result) {
      if (checkInfo) return false;

      if (!isPreterm) {
        result.classList.remove("hidden");
        result.innerHTML = `<div class="warning">請輸入檢核日期。</div>`;
        return true;
      }

      const pretermData = getPretermDueDate(birthInfo);

      if (pretermData.error) {
        result.classList.remove("hidden");
        result.innerHTML = `<div class="warning">${pretermData.error}</div>`;
        return true;
      }

      result.classList.remove("hidden");
      result.innerHTML = `
        <div class="result-title">✅ 已取得預產期</div>
        ${section("查詢結果", [
          line("出生日期", formatDateByCalendar(birthInfo.date, birthInfo.calendar)),
          line("預產期", formatDateByCalendar(pretermData.dueDate, pretermData.calendar)),
          line("說明", pretermData.message)
        ])}
      `;

      return true;
    }

    function calculate() {
      const birthInfo = parseDateInfo(document.getElementById("birthDate").value);
      const checkInfo = parseDateInfo(document.getElementById("checkDate").value);
      const isPreterm = document.getElementById("isPreterm").checked;
      const result = document.getElementById("result");

      if (!birthInfo) {
        result.classList.remove("hidden");
        result.innerHTML = `<div class="warning">請確認出生日期是否正確。</div>`;
        return;
      }

      if (calculateOnlyDueDateIfNeeded(birthInfo, checkInfo, isPreterm, result)) {
        return;
      }

      if (!checkInfo) {
        result.classList.remove("hidden");
        result.innerHTML = `<div class="warning">請確認檢核日期是否正確。</div>`;
        return;
      }

      if (checkInfo.date < birthInfo.date) {
        result.classList.remove("hidden");
        result.innerHTML = `<div class="warning">檢核日期不可早於出生日期。</div>`;
        return;
      }

      const actualAge = calculateAge(birthInfo.date, checkInfo.date);
      const actualStage = getStageByAge(actualAge);

      let html = `
        <div class="result-title">✅ 計算完成</div>
        ${section("實際年齡結果", [
          line("出生日期", formatDateByCalendar(birthInfo.date, birthInfo.calendar)),
          line("檢核日期", formatDateByCalendar(checkInfo.date, checkInfo.calendar)),
          line("實際年齡", formatAge(actualAge)),
          line("建議檢核表", actualStage.name),
          line("適用區間", actualStage.rangeText)
        ])}
      `;

      if (isPreterm) {
        const pretermData = getPretermDueDate(birthInfo);

        if (pretermData.error) {
          result.classList.remove("hidden");
          result.innerHTML = `<div class="warning">${pretermData.error}</div>`;
          return;
        }

        if (checkInfo.date < pretermData.dueDate) {
          html += `
            ${section("早產兒資料", [
              line("預產期", formatDateByCalendar(pretermData.dueDate, pretermData.calendar)),
              line("說明", pretermData.message)
            ])}
            <div class="result-note">提醒：檢核日期早於預產期，矯正年齡尚未滿 0 個月。</div>
          `;

          result.classList.remove("hidden");
          result.innerHTML = html;
          return;
        }

        const correctedAge = calculateAge(pretermData.dueDate, checkInfo.date);
        const correctedStage = getStageByAge(correctedAge);

        html += `
          ${section("早產兒矯正年齡結果", [
            line("預產期", formatDateByCalendar(pretermData.dueDate, pretermData.calendar)),
            line("說明", pretermData.message),
            line("矯正年齡", formatAge(correctedAge)),
            line("依矯正年齡建議檢核表", correctedStage.name),
            line("適用區間", correctedStage.rangeText)
          ])}
          <div class="result-note">提醒：早產兒建議優先參考矯正年齡判斷發展檢核階段。</div>
        `;
      }

      result.classList.remove("hidden");
      result.innerHTML = html;
    }

    function findDateByExactAge(birthDate, targetAge) {
      const searchEnd = new Date(
        birthDate.getFullYear() + 7,
        birthDate.getMonth(),
        birthDate.getDate()
      );

      let current = new Date(
        birthDate.getFullYear(),
        birthDate.getMonth(),
        birthDate.getDate()
      );

      while (current <= searchEnd) {
        const age = calculateAge(birthDate, current);

        if (
          age.years === targetAge.years &&
          age.months === targetAge.months &&
          age.days === targetAge.days
        ) {
          return new Date(current);
        }

        current.setDate(current.getDate() + 1);
      }

      return null;
    }

    function reverseCalculate() {
      const birthInfo = parseDateInfo(document.getElementById("reverseBirthDate").value);
      const yearsInput = document.getElementById("reverseYears").value;
      const monthsInput = document.getElementById("reverseMonths").value;
      const daysInput = document.getElementById("reverseDays").value;
      const reverseResult = document.getElementById("reverseResult");

      const years = Number(yearsInput || 0);
      const months = Number(monthsInput || 0);
      const days = Number(daysInput || 0);

      if (!birthInfo) {
        reverseResult.classList.remove("hidden");
        reverseResult.innerHTML = `<div class="warning">請確認幼兒出生日期是否正確。</div>`;
        return;
      }

      if (yearsInput === "" && monthsInput === "" && daysInput === "") {
        reverseResult.classList.remove("hidden");
        reverseResult.innerHTML = `<div class="warning">請輸入檢核年齡。</div>`;
        return;
      }

      if (years < 0 || months < 0 || days < 0) {
        reverseResult.classList.remove("hidden");
        reverseResult.innerHTML = `<div class="warning">檢核年齡不可小於 0。</div>`;
        return;
      }

      const targetAge = {
        years: years,
        months: months,
        days: days
      };

      const checkDate = findDateByExactAge(birthInfo.date, targetAge);

      if (!checkDate) {
        reverseResult.classList.remove("hidden");
        reverseResult.innerHTML = `<div class="warning">無法回推出檢核日期，請確認年齡是否正確。</div>`;
        return;
      }

      const stage = getStageByAge(targetAge);

      reverseResult.classList.remove("hidden");
      reverseResult.innerHTML = `
        <div class="result-title">✅ 回推完成</div>
        ${section("回推結果", [
          line("輸入檢核年齡", formatAge(targetAge)),
          line("回推檢核日期", formatDateByCalendar(checkDate, birthInfo.calendar)),
          line("對應檢核表", stage.name),
          line("適用區間", stage.rangeText)
        ])}
      `;
    }


    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function rocInput(date) {
      return `${date.getFullYear() - 1911}/${pad2(date.getMonth() + 1)}/${pad2(date.getDate())}`;
    }

    let rocPickerTarget = null;
    let rocPickerView = new Date();
    let rocPickerMode = "month";
    let rocYearPageStart = null;
    let rocSelectedYearForMonth = null;

    function openRocPicker(targetId) {
      rocPickerTarget = targetId;
      const currentInfo = parseDateInfo(document.getElementById(targetId).value);
      const current = currentInfo ? currentInfo.date : new Date();
      rocPickerView = new Date(current.getFullYear(), current.getMonth(), 1);
      rocPickerMode = "month";
      rocYearPageStart = null;
      renderRocPicker(currentInfo ? currentInfo.date : null);
      document.getElementById("rocPickerBackdrop").style.display = "flex";
    }

    function closeRocPicker(event) {
      if (event && event.target && event.target.id !== "rocPickerBackdrop") return;
      document.getElementById("rocPickerBackdrop").style.display = "none";
    }

    function moveRocMonth(delta) {
      if (rocPickerMode === "year") {
        moveRocYearPage(delta);
        return;
      }

      if (rocPickerMode === "monthSelect") {
        rocPickerView.setFullYear(rocPickerView.getFullYear() + delta);
        rocSelectedYearForMonth = rocPickerView.getFullYear();
        const currentInfo = rocPickerTarget ? parseDateInfo(document.getElementById(rocPickerTarget).value) : null;
        renderRocPicker(currentInfo ? currentInfo.date : null);
        return;
      }

      rocPickerView.setMonth(rocPickerView.getMonth() + delta);
      const currentInfo = rocPickerTarget ? parseDateInfo(document.getElementById(rocPickerTarget).value) : null;
      renderRocPicker(currentInfo ? currentInfo.date : null);
    }

    function toggleRocYearPanel() {
      if (rocPickerMode === "year") {
        rocPickerMode = "month";
      } else {
        rocPickerMode = "year";
        const rocYear = rocPickerView.getFullYear() - 1911;
        rocYearPageStart = Math.floor((rocYear - 1) / 12) * 12 + 1;
      }
      const currentInfo = rocPickerTarget ? parseDateInfo(document.getElementById(rocPickerTarget).value) : null;
      renderRocPicker(currentInfo ? currentInfo.date : null);
    }

    function moveRocYearPage(delta) {
      if (rocYearPageStart === null) {
        const rocYear = rocPickerView.getFullYear() - 1911;
        rocYearPageStart = Math.floor((rocYear - 1) / 12) * 12 + 1;
      }
      rocYearPageStart += delta * 12;
      if (rocYearPageStart < 1) rocYearPageStart = 1;
      const currentInfo = rocPickerTarget ? parseDateInfo(document.getElementById(rocPickerTarget).value) : null;
      renderRocPicker(currentInfo ? currentInfo.date : null);
    }

    function sameDay(a, b) {
      return a && b &&
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate();
    }

    function hideAllRocPickerViews() {
      const monthView = document.getElementById("rocMonthView");
      const yearGrid = document.getElementById("rocYearGrid");
      const monthGrid = document.getElementById("rocMonthGrid");

      if (monthView) monthView.classList.add("hidden-view");
      if (yearGrid) yearGrid.classList.remove("open");
      if (monthGrid) monthGrid.classList.remove("open");
    }

    function renderRocPicker(selectedDate) {
      const year = rocPickerView.getFullYear();
      const month = rocPickerView.getMonth();
      const rocYear = year - 1911;

      const monthView = document.getElementById("rocMonthView");
      const yearGrid = document.getElementById("rocYearGrid");
      const monthGrid = document.getElementById("rocMonthGrid");

      if (rocPickerMode === "year") {
        hideAllRocPickerViews();
        yearGrid.classList.add("open");

        if (rocYearPageStart === null) {
          rocYearPageStart = Math.floor((rocYear - 1) / 12) * 12 + 1;
        }

        const endYear = rocYearPageStart + 11;
        document.getElementById("rocPickerTitle").textContent = `民國${rocYearPageStart}～${endYear}年`;
        yearGrid.innerHTML = "";

        for (let y = rocYearPageStart; y <= endYear; y++) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "roc-year-btn";
          if (y === rocYear) button.classList.add("selected");
          button.textContent = `民國${y}年`;

          // 點年份後，不直接跳日期；先進入 1～12 月選擇
          button.onclick = function () {
            rocPickerView.setFullYear(y + 1911);
            rocSelectedYearForMonth = y + 1911;
            rocPickerMode = "monthSelect";
            const currentInfo = rocPickerTarget ? parseDateInfo(document.getElementById(rocPickerTarget).value) : null;
            renderRocPicker(currentInfo ? currentInfo.date : null);
          };

          yearGrid.appendChild(button);
        }
        return;
      }

      if (rocPickerMode === "monthSelect") {
        hideAllRocPickerViews();
        monthGrid.classList.add("open");

        const displayYear = rocPickerView.getFullYear();
        const displayRocYear = displayYear - 1911;
        document.getElementById("rocPickerTitle").textContent = `民國${displayRocYear}年：選擇月份`;
        monthGrid.innerHTML = "";

        for (let m = 0; m < 12; m++) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "roc-month-btn";
          if (m === rocPickerView.getMonth()) button.classList.add("selected");
          button.textContent = `${m + 1}月`;

          // 點月份後，才進入日期選擇
          button.onclick = function () {
            rocPickerView = new Date(displayYear, m, 1);
            rocPickerMode = "month";
            const currentInfo = rocPickerTarget ? parseDateInfo(document.getElementById(rocPickerTarget).value) : null;
            renderRocPicker(currentInfo ? currentInfo.date : null);
          };

          monthGrid.appendChild(button);
        }
        return;
      }

      hideAllRocPickerViews();
      monthView.classList.remove("hidden-view");
      document.getElementById("rocPickerTitle").textContent = `民國${rocYear}年${month + 1}月`;

      const grid = document.getElementById("rocPickerGrid");
      grid.innerHTML = "";

      const first = new Date(year, month, 1);
      const start = new Date(year, month, 1 - first.getDay());
      const today = new Date();

      for (let i = 0; i < 42; i++) {
        const day = new Date(start);
        day.setDate(start.getDate() + i);
        const button = document.createElement("button");
        button.type = "button";
        button.className = "roc-day";
        if (day.getMonth() !== month) button.classList.add("muted");
        if (sameDay(day, today)) button.classList.add("today");
        if (sameDay(day, selectedDate)) button.classList.add("selected");
        button.textContent = day.getDate();
        button.onclick = function () {
          if (rocPickerTarget) {
            document.getElementById(rocPickerTarget).value = rocInput(day);
          }
          closeRocPicker();
        };
        grid.appendChild(button);
      }
    }

    function pickToday() {
      const today = new Date();
      if (rocPickerTarget) {
        document.getElementById(rocPickerTarget).value = rocInput(today);
      }
      closeRocPicker();
    }

    function clearRocPickerTarget() {
      if (rocPickerTarget) {
        document.getElementById(rocPickerTarget).value = "";
      }
      closeRocPicker();
    }


    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/service-worker.js");
      });
    }
  </script>

<div class="roc-picker-backdrop" id="rocPickerBackdrop" onclick="closeRocPicker(event)">
  <div class="roc-picker" onclick="event.stopPropagation()">
    <div class="roc-picker-head">
      <button type="button" class="roc-nav" onclick="moveRocMonth(-1)">‹</button>
      <button type="button" class="roc-title roc-title-button" id="rocPickerTitle" onclick="toggleRocYearPanel()">民國115年7月</button>
      <button type="button" class="roc-nav" onclick="moveRocMonth(1)">›</button>
    </div>
    <div class="roc-month-view" id="rocMonthView">
      <div class="roc-week">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <div class="roc-grid" id="rocPickerGrid"></div>
    </div>
    <div class="roc-year-grid" id="rocYearGrid"></div>
    <div class="roc-month-grid" id="rocMonthGrid"></div>
    <div class="roc-picker-actions">
      <button type="button" class="roc-action light" onclick="pickToday()">今天</button>
      <button type="button" class="roc-action light" onclick="clearRocPickerTarget()">清除</button>
      <button type="button" class="roc-action main" onclick="closeRocPicker()">關閉</button>
    </div>
    <div class="roc-format-hint">可輸入民國或西元；點上方民國年可選年份，再選月份與日期</div>
  </div>
</div>

</body>
