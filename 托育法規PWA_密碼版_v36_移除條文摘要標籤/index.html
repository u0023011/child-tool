<p>請輸入密碼後進入。</p>

<script>
(function () {
  const saved = sessionStorage.getItem("lawToolUnlocked");
  if (saved === "yes") {
    const gate = document.getElementById("passwordGate");
    if (gate) gate.style.display = "none";
  }

  window.checkPassword = function () {
    const input = document.getElementById("passwordInput");
    const msg = document.getElementById("passwordMsg");
    if ((input.value || "").trim() === "3728") {
      sessionStorage.setItem("lawToolUnlocked", "yes");
      document.getElementById("passwordGate").style.display = "none";
    } else {
      msg.textContent = "密碼不正確，請再試一次。";
      input.value = "";
      input.focus();
    }
  };

  window.addEventListener("DOMContentLoaded", function () {
    const input = document.getElementById("passwordInput");
    if (input) {
      input.focus();
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") checkPassword();
      });
    }
  });
})();
</script>

 "future": ""}, {"cat": "inspect", "id": "E03", "title": "檢查時未提供共同居住成員或主要照顧人名冊", "law": "管理辦法第19條", "summary": "檢查輔導時應提供實際共同居住成員姓名、與托育人員關係、年齡；共同托育者應提供主要照顧人名冊。", "effect": "可列入不配合檢查或輔導；涉及共同居住者不適任或共同托育責任不明時風險增加。", "penalty": "視是否構成拒檢或其他違規。", "fine": "視情節", "improve": "是", "per": "視情節", "stop": "否", "transfer": "否", "revoke": "可能", "public": "可能影響準公共；若符合準公共作業要點第8點，應即終止契約", "future": ""}, {"cat": "inspect", "id": "E04", "title": "檢查時未提供健康檢查或在職訓練證明", "law": "管理辦法第19條", "summary": "檢查輔導時應提供托育人員健康檢查證明及在職訓練證明。", "effect": "可列入不配合檢查或未遵守第4條訓練、健康檢查義務；換證亦受影響。", "penalty": "視情節。", "fine": "視情節", "improve": "是", "per": "視情節", "stop": "否", "transfer": "否", "revoke": "可能", "public": "可能影響準公共與換證", "future": ""}, {"cat": "inspect", "id": "E05", "title": "經列入應改善事項，屆期未改善", "law": "兒少權法第90條；管理辦法第18-1條（輔導改善概念）", "summary": "輔導或檢查結果列入應改善事項，屆期未改善者，可能進入裁處或加重處理。", "effect": "若屬兒少權法第90條所列登記、收托人數、輔導結果列入應改善而屆期未改善，可能罰鍰、按次處罰、重大或三次仍未改善得廢止登記。", "penalty": "6,000～30,000元；得按次處罰；情節重大或三次仍未改善得廢止登記。", "fine": "是", "improve": "是", "per": "是", "stop": "視情節", "transfer": "視情節", "revoke": "可能", "public": "可能影響準公共；若符合準公共作業要點第8點，應即終止契約", "future": ""}, {"cat": "inspect", "id": "E06", "title": "主管機關命停止服務後仍繼續服務", "law": "兒少權法第26-1條第4項、第90條第7項", "summary": "有不得擔任居家托育人員情事者，主管機關應命停止服務並強制轉介；不依命令停止服務者另有罰則。", "effect": "處6萬元以上30萬元以下罰鍰，並得公布姓名；已登記者並廢止登記。", "penalty": "60,000～300,000元；得公布姓名。", "fine": "是", "improve": "否", "per": "否", "stop": "是", "transfer": "是", "revoke": "是", "public": "重大影響／終止契約", "future": ""}, {"cat": "inspect", "id": "E07", "title": "拒不配合轉介兒童", "law": "兒少權法第90條", "summary": "未登記或依法命轉介時，拒不配合轉介所收托兒童者，主管機關得強制轉介並裁罰。", "effect": "處6,000元以上3萬元以下罰鍰，主管機關並應強制轉介所收托兒童。", "penalty": "6,000～30,000元。", "fine": "是", "improve": "否", "per": "否", "stop": "可能", "transfer": "是", "revoke": "視情節", "public": "重大影響；若符合準公共作業要點第8點，應即終止契約", "future": ""},
{"cat": "care", "id": "C17", "title": "托育服務時間使六歲以下或需要特別看護之收托兒童獨處，或由不適當之人代為照顧", "law": "現行：兒少權法第51條；管理辦法第4條第1款、第5條第1款；兒托法補充：第19條、第78條", "summary": "托育服務時間不得使六歲以下或需要特別看護之收托兒童獨處，也不得由不適當之人代為照顧；不適當之人包含無行為能力人、七歲以上未滿十二歲兒童，或依客觀事實足認有影響兒童身心健康或安全之虞者。", "effect": "高風險照顧事件；可能涉及未專心托育、疏忽照顧或兒童保護事件。", "penalty": "依具體情節處理；若涉及兒少保護事件，可能命停止服務、轉介或廢止登記。", "fine": "是／視情節", "improve": "是／視情節", "per": "是／視情節", "stop": "可能", "transfer": "可能", "revoke": "可能", "public": "準公共作業要點第8點：若屬居家管理辦法第5條違規經查證屬實，應即終止契約", "future": "第19條明定居家托育人員於托育服務時間應於托育服務處所專心托育，不得使六歲以下或需要特別看護之收托兒童獨處或由不適當之人代為照顧。<br><strong>罰則：</strong>依第78條，未依第19條規定於收托時間及托育服務處所專心托育者，處新臺幣1萬元以上5萬元以下罰鍰，並令限期改善；屆期未改善者，按次處罰；情節重大或經處罰三次仍未改善者，得公布姓名及廢止登記。"},
{"cat": "care", "id": "C18", "title": "兒童發生緊急傷病或事故傷害，未依救護原則處理", "law": "兒托法補充：第20條；現行可依兒童安全與照顧義務綜合判斷", "summary": "兒童發生緊急傷病或事故傷害時，居家托育人員應依主管機關訂定之救護原則，執行施救步驟、護送就醫、呼叫緊急救護專線支援等事項，並於家長或實際照顧者到達前採取必要處置。", "effect": "可能涉及照顧安全、事故處理及兒童最佳利益；若造成兒童權益受損，可能併依兒少保護或其他規定處理。", "penalty": "兒托法第20條本身未直接列入第78條居家托育人員立即罰鍰款項；但可能依後續子法、違規記點或個案情節處理。", "fine": "視情節", "improve": "是", "per": "視情節", "stop": "視情節", "transfer": "視情節", "revoke": "視情節", "public": "可能影響準公共及評估", "future": "第20條明定地方主管機關應訂定居家托育服務緊急傷病或事故傷害救護原則；兒童發生緊急傷病或事故傷害時，居家托育人員應依該原則執行施救、護送就醫、呼叫緊急救護專線等事項，並於家長或實際照顧者未到達前採取必要處置。<br><strong>罰則提醒：</strong>第20條未直接列入第78條居家托育人員立即罰鍰款項；實際裁處仍須依施行後子法、違規記點辦法及個案情節判斷。"},
{"cat": "care", "id": "C19", "title": "未交付書面契約影本予居家托育服務中心", "law": "兒托法補充：第17條、第84條", "summary": "居家托育人員除應與家長或實際照顧者訂定書面契約外，也應提供契約影本予居家托育服務中心。", "effect": "影響居托中心掌握收托資料、契約內容與後續爭議處理。", "penalty": "兒托法施行後，依第84條可令限期改善；屆期未改善者處6,000元以上3萬元以下罰鍰，並按次處罰。", "fine": "是", "improve": "是", "per": "是", "stop": "否／視情節", "transfer": "否", "revoke": "視情節", "public": "可能影響準公共管理", "future": "第17條第1項後段明定，居家托育人員應提供書面契約影本予居家托育服務中心。<br><strong>罰則：</strong>依第84條，未交付書面契約影本予居家托育服務中心者，令限期改善，屆期未改善者，處新臺幣6,000元以上3萬元以下罰鍰，並按次處罰。"},
{"cat": "care", "id": "C20", "title": "家長對托育服務方式或內容有意見，未提出說明或協議調整", "law": "兒托法補充：第21條", "summary": "家長或實際照顧者對居家托育人員提供之托育服務方式及內容有意見時，得請求托育人員提出說明，並得經雙方協議視需要修正或調整。", "effect": "可能衍生照顧爭議；建議作為輔導提醒與溝通紀錄項目。", "penalty": "第21條偏向托育說明與溝通機制，未直接列入第78條罰鍰款項。", "fine": "否／視情節", "improve": "是", "per": "否", "stop": "否", "transfer": "否", "revoke": "否／視情節", "public": "可能影響服務評估", "future": "第21條明定，兒童之法定代理人或實際照顧兒童之人對托育服務方式及內容有意見時，得請求居家托育人員提出說明，並得經雙方協議視需要修正或調整。<br><strong>罰則提醒：</strong>第21條未直接列入第78條居家托育人員立即罰鍰款項，較適合作為照顧爭議、輔導及溝通紀錄項目。"},
{"cat": "care", "id": "C21", "title": "知悉違法或不當對待事件，未於24小時內通報主管機關", "law": "現行：兒少權法第53條；兒托法補充：第59條、第78條", "summary": "執行業務時知悉兒童有違法或不當對待事件，應向直轄市、縣（市）主管機關通報，至遲不得超過24小時。", "effect": "影響兒童保護及主管機關即時介入；若同時涉及不當對待事件，應立即補行通報並配合調查。", "penalty": "兒托法施行後，居家托育人員未依第59條第1項通報者，依第78條處1萬元以上5萬元以下罰鍰，並令限期改善；屆期未改善按次處罰；情節重大或三次仍未改善者，得公布姓名及廢止登記。", "fine": "是", "improve": "是", "per": "是", "stop": "視情節", "transfer": "視情節", "revoke": "可能", "public": "重大影響；若符合準公共作業要點第8點，應即終止契約", "future": "第59條明定托育相關人員或居家托育服務中心工作人員於執行業務時，知悉涉有違法事件，應通報直轄市、縣（市）主管機關，至遲不得超過24小時。<br><strong>罰則：</strong>居家托育人員未依第59條第1項通報者，依第78條處新臺幣1萬元以上5萬元以下罰鍰，並令限期改善；屆期未改善者，按次處罰；情節重大或經處罰三次仍未改善者，得公布姓名及廢止登記。"},
{"cat": "inspect", "id": "E08", "title": "檢查時藉故藏匿兒童", "law": "現行：管理辦法第5條第4款、第19條；兒托法補充：第13條、第78條、第79條", "summary": "主管機關或居家托育服務中心進行監督及檢查時，不得規避、妨礙或拒絕；檢查時不得藉故藏匿兒童。", "effect": "屬重大檢查配合義務違反，可能影響收托人數查核與兒童安全。", "penalty": "兒托法施行後，居家托育人員違反者依第78條；居家托育人員以外之任何人違反者依第79條，均可能處1萬元以上5萬元以下罰鍰。", "fine": "是", "improve": "是／視情節", "per": "是／視情節", "stop": "視情節", "transfer": "視情節", "revoke": "可能", "public": "重大影響；若符合準公共作業要點第8點，應即終止契約", "future": "第13條第4項明定任何人不得規避、妨礙或拒絕主管機關及居家托育服務中心對居家托育人員之監督及檢查；檢查時不得藉故藏匿兒童。<br><strong>罰則一：</strong>居家托育人員違反者，依第78條處新臺幣1萬元以上5萬元以下罰鍰，並令限期改善；屆期未改善者，按次處罰；情節重大或經處罰三次仍未改善者，得公布姓名及廢止登記。<br><strong>罰則二：</strong>居家托育人員以外之任何人違反者，依第79條處新臺幣1萬元以上5萬元以下罰鍰。"}

{"cat": "register", "id": "A11", "title": "限期辦理登記或改善期間增加收托", "law": "現行：兒少權法第90條；兒托法補充：第75條", "summary": "居家托育人員於主管機關限期辦理登記或改善期間，不得增加收托兒童。", "effect": "屬未登記或登記管理違規的加重情形，主管機關可命停止收托、轉介兒童或強制轉介。", "penalty": "現行兒少權法第90條：限期改善期間增加收托兒童者，處新臺幣6,000元以上3萬元以下罰鍰，並得按次處罰。", "fine": "是", "improve": "是", "per": "是", "stop": "可能", "transfer": "可能", "revoke": "未登記者不屬廢止登記；已登記者視情節", "public": "不得簽約或可能終止契約", "future": "第75條針對居家托育人員未登記提供托育服務及限期辦理登記期間增加收托設有處罰。<br><strong>罰則提醒：</strong>限期辦理登記期間增加收托，兒托法罰鍰較現行兒少權法提高，可能處新臺幣2萬元以上10萬元以下罰鍰，並得命停止收托及轉介兒童。"},
{"cat": "register", "id": "A12", "title": "租借、轉讓或借用托育服務證書", "law": "現行：管理辦法第13條；兒托法補充：第62條、第74條", "summary": "托育人員不得將托育服務證書或資格證明文件租借、轉讓或提供他人使用，也不得借用他人證書辦理或提供服務。", "effect": "影響托育資格真實性與管理秩序，可能涉及資格不實、未登記或違法收托。", "penalty": "現行可依管理辦法及主管機關管理處分處理；若因此造成無照或未登記收托，另依兒少權法第90條處理。", "fine": "是／視情節", "improve": "是／視情節", "per": "視情節", "stop": "可能", "transfer": "可能", "revoke": "可能", "public": "不得簽約或可能終止契約", "future": "第62條明定不得租借托育服務證書或資格證明文件予他人使用。<br><strong>罰則：</strong>依第74條，個人租借證書或資格證明文件予他人使用者，處新臺幣3萬元以上15萬元以下罰鍰；涉及機構租借他人證書者，依機構相關罰則處理。"},

function qs(s){return document.querySelector(s)} function qsa(s){return Array.from(document.querySelectorAll(s))}
function setStep(n){
 ["p1","p2","p3"].forEach((id,i)=>qs("#"+id).classList.toggle("active",i===n-1));
 ["s1","s2","s3"].forEach((id,i)=>{
  let e=qs("#"+id);
  e.className="step";
  if(i===n-1)e.classList.add("active");
  else if(i<n-1)e.classList.add("done");
 });
 setTimeout(()=>{
  const target=document.querySelector(".container") || document.body;
  target.scrollIntoView({behavior:"smooth", block:"start"});
  window.scrollTo({top:0, behavior:"smooth"});
 },80);
}
function renderCats(){let a=qs("#cats");a.innerHTML="";categories.forEach(c=>{let l=document.createElement("label");l.className="card";l.innerHTML=`<input type="checkbox" class="cat" value="${c.id}" onchange="this.closest('.card').classList.toggle('selected',this.checked)"><div><div class="ct">${c.title}</div><div class="cs">${c.sub}</div></div>`;a.appendChild(l)})}
function selectedCats(){return qsa(".cat:checked").map(i=>i.value)} function go1(){setStep(1)} function go2(){if(!selectedCats().length){alert("請至少選擇一項問題類型。");return}renderDetails();setStep(2)} function go3(){let r=getSelected(); if(!r.length){alert("請勾選至少一項細項，或在收托人數表填入超過規定的人數。");return}setStep(3);generate()}

function itemPriority(it){
 const text = ((it.title||"")+" "+(it.law||"")+" "+(it.summary||"")+" "+(it.effect||"")+" "+(it.penalty||"")+" "+(it.public||"")+" "+(it.revoke||"")+" "+(it.stop||"")+" "+(it.transfer||""));
 let score = 0;
 if(/應即終止契約|終止契約|不得簽約|不予續約|退準公|第8點|第八點/.test(text)) score += 100;
 if(/廢止登記|廢止其登記/.test(text)) score += 90;
 if(/停止服務|命其停止|停止收托|暫停新收托/.test(text)) score += 80;
 if(/強制轉介|轉介/.test(text)) score += 70;
 if(/罰鍰|[0-9０-９]+萬|6萬|30萬|60萬|6000|6,000|3萬元|5萬元/.test(text)) score += 40;
 if(/限期改善|按次處罰/.test(text)) score += 20;
 return score;
}
function itemBadges(it){
 const text = ((it.title||"")+" "+(it.law||"")+" "+(it.summary||"")+" "+(it.effect||"")+" "+(it.penalty||"")+" "+(it.public||"")+" "+(it.revoke||"")+" "+(it.stop||"")+" "+(it.transfer||""));
 let badges = [];
 const add = (cls, label) => { if(!badges.some(b=>b.label===label)) badges.push({cls,label}); };
 if(/應即終止契約|終止契約|不得簽約|不予續約|退準公|第8點|第八點/.test(text)) add("critical","退準公／終止契約");
 if(/廢止登記|廢止其登記/.test(text)) add("critical","可能廢止登記");
 if(/停止服務|命其停止|停止收托|暫停新收托/.test(text)) add("critical","可能停止服務");
 if(/強制轉介|轉介/.test(text)) add("warn","可能轉介");
 if(/罰鍰|[0-9０-９]+萬|6萬|30萬|60萬|6000|6,000|3萬元|5萬元/.test(text)) add("warn","有罰鍰");
 if(/限期改善|按次處罰/.test(text)) add("info","限改／按次");
 return badges;
}
function itemBadgeHtml(it){
 const badges = itemBadges(it);
 if(!badges.length) return "";
 return `<div class="item-badges">${badges.map(b=>`<span class="item-badge ${b.cls}">${b.label}</span>`).join("")}</div>`;
}
function itemClassByPriority(it){
 const s = itemPriority(it);
 if(s >= 90) return "item item-critical";
 if(s >= 40) return "item item-warn";
 return "item item-normal";
}

function renderDetails(){let cats=selectedCats(),kw="",area=qs("#details");area.innerHTML="";cats.forEach(cid=>{let c=categories.find(x=>x.id===cid);let block=document.createElement("div");block.className="block";block.innerHTML=`<h2>${c.title}</h2><div class="helper">${c.sub}</div>`;
if(cid==="ratio"){block.innerHTML+=`<div class="count-box"><div class="count-title">收托人數填寫</div><div class="count-note">請填同一時段實際照顧人數。半日／日間／延長／臨時托育合計至多4人且未滿2歲至多2人；全日／夜間至多2人；達5人以上會補充兒托法第71條（尚未實施）。</div><table class="count-table"><thead><tr><th></th><th>未滿2歲</th><th>2歲以上</th></tr></thead><tbody>${["半日托育","日間托育","夜間托育","全日托育","延長托育","臨時托育"].map((n,i)=>`<tr><td>${n}</td><td><input type="number" min="0" class="count-input u2" data-row="${i}"></td><td><input type="number" min="0" class="count-input o2" data-row="${i}"></td></tr>`).join("")}</tbody></table></div>`}
let fs=items.filter(it=>it.cat===cid && (!kw || (it.title+it.law+it.summary).includes(kw)));
fs.sort((a,b)=>itemPriority(b)-itemPriority(a) || a.title.localeCompare(b.title,"zh-Hant"));
block.innerHTML+=`<div class="priority-note">已優先排序：退準公／廢止登記／停止服務／罰鍰等高風險項目會排在前面並以顏色標示。</div>`;
fs.forEach(it=>{let l=document.createElement("label");l.className=itemClassByPriority(it);l.innerHTML=`<input type="checkbox" class="detail" value="${it.id}"><div><div class="ct">${it.title}</div><div class="cs">${it.law}</div>${itemBadgeHtml(it)}</div>`;block.appendChild(l)});if(!fs.length) block.innerHTML+=`<div class="empty">沒有符合的細項。</div>`;area.appendChild(block)})}

function autoItem(title,summary,total){return {cat:"ratio",id:"auto"+title,title,law:"管理辦法第7條；兒少權法第90條；準公共作業要點第8點",summary:`${summary}<br><br><strong>管理辦法第7條：</strong>居家托育人員收托人數，半日托育、日間托育、延長托育或臨時托育合計至多4人，其中未滿2歲兒童至多2人；全日托育及夜間托育至多2人。收托人數應包含托育人員未滿3歲子女、受其監護者、三親等內未滿5歲兒童，以及未滿12歲且未收取托育費用之兒童；到宅托育以該住所或居所實際受照顧兒童人數計算。<br><br><strong>兒少權法第90條：</strong>居家式托育服務提供者違反收托人數規定者，處新臺幣6,000元以上3萬元以下罰鍰，並得按次處罰；情節重大或經處罰三次後仍未改善者，得廢止登記。<br><br><strong>準公共作業要點第8點：</strong>合作對象擅自改變原收托條件或收托比違反法令規定，地方政府應即終止契約。`,effect:"違反收托人數規定；若為準公共合作對象，亦屬準公共作業要點第8點收托比違反法令規定之退場情形。",penalty:"依兒少權法第90條第5項，處新臺幣6,000元以上3萬元以下罰鍰，並得按次處罰；情節重大或經處罰三次後仍未改善者，得廢止登記。",fine:"是",improve:"是",per:"是",stop:"視情節",transfer:"視情節",revoke:"可能",public:"準公共作業要點第8點：收托比違反法令規定，應即終止契約",future:total>=5?"第71條規定，居家托育人員違反收托人數規定且收托人數五人以上者，處6萬～30萬元罰鍰，並令限期改善；屆期未改善得按次處罰，情節重大或三次仍未改善者，廢止登記。":""}}

function penaltyFocus(it){
 const fineText = (it.fine && it.fine.includes("是")) ? (it.penalty || "有罰鍰，金額依個案") : (it.fine || "視個案");
 const revokeText = it.revoke || "視個案";
 const publicText = publicImpactText(it);
 const fineCritical = (it.fine && it.fine.includes("是")) || (it.penalty && /罰鍰|元|萬/.test(it.penalty));
 const revokeCritical = /廢止|可能|是/.test(revokeText);
 const publicCritical = /終止|第8點|第八點|不得簽約|不予續約|減列|停止|追繳|退出|退準公|補助/.test(publicText);
 return `<div class="focus-box">
   <div class="focus-title">⚠️ 重點檢視：罰鍰／廢止／退準公</div>
   <div class="focus-grid">
    <div class="focus-item ${fineCritical ? "focus-critical" : ""}"><strong>是否罰鍰／金額</strong>${highlightPenaltyText(fineText)}</div>
    <div class="focus-item ${revokeCritical ? "focus-critical" : ""}"><strong>是否廢止登記</strong>${highlightPenaltyText(revokeText)}</div>
    <div class="focus-item ${publicCritical ? "focus-critical" : ""}"><strong>準公共影響</strong>${highlightPenaltyText(publicText)}</div>
   </div>
  </div>`;
}



function highlightPenaltyText(text){
 if(text === undefined || text === null) return "";
 let s = String(text);
 const patterns = [
  "廢止登記",
  "廢止其登記",
  "廢止設立許可",
  "停止服務",
  "停止收托",
  "暫停新收托",
  "命其停止",
  "令其停止",
  "應即終止契約",
  "終止契約",
  "不得簽約",
  "不予續約",
  "強制轉介",
  "轉介收托兒童",
  "罰鍰",
  "罰鍰金額",
  "處新臺幣",
  "處臺幣",
  "處6萬",
  "處 6萬",
  "處1萬",
  "處 1萬",
  "處6,000",
  "處 6,000",
  "按次處罰",
  "限期改善",
  "公布姓名",
  "公布行為人姓名",
  "記違規點數"
 ];
 patterns.forEach(p=>{
   const esc = p.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
   s = s.replace(new RegExp(esc, "g"), `<span class="penalty-key">${p}</span>`);
 });
 // 金額區間也標紅
 s = s.replace(/(新臺幣)?([0-9,]+元以上[0-9,]+萬元?以下|[0-9]+萬元以上[0-9]+萬元以下|[0-9,]+元以上[0-9,]+元以下)/g, '<span class="penalty-key">$&</span>');
 return s;
}
function highlightArticleHtml(html){
 if(!html) return "";
 return String(html).replace(/<span>(.*?)<\/span>/g, (m, inner)=>`<span>${highlightPenaltyText(inner)}</span>`);
}
