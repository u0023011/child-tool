const items=[{"cat": "reg", "id": "A01", "title": "未辦理登記即收托", "law": "兒少權法第26條第1項、第90條", "summary": "居家式托育服務提供者應辦理登記；未辦理登記即提供居家托育服務，進入兒少權法第90條處理。", "effect": "處6,000元以上3萬元以下罰鍰並命限期改善；屆期未改善者再罰並命一個月內轉介；拒不轉介或改善期間新增收托另有處理。", "penalty": "6,000～30,000；屆期未改善可再罰；拒不轉介或改善期間新增收托亦可裁罰。", "fine": "是", "improve": "是", "per": "是", "stop": "可能", "transfer": "是", "revoke": "否／未登記不屬廢止登記；但可命停止及轉介", "public": "不符合準公共基本資格", "future": "第13條明定取得居家托育服務證書後，始得提供居家托育服務。<br><strong>罰則：</strong>依第78條，違反第13條第1項規定者，處新臺幣1萬元以上5萬元以下罰鍰，並令限期改善；屆期未改善者，得按次處罰；情節重大或經處罰三次後仍未改善者，得公布姓名及廢止登記。<br><br><strong>可能連動第71條加重處罰：</strong>第71條規定，未依規定申請托育機構設立許可而收托兒童者，處新臺幣6萬元以上30萬元以下罰鍰，並令其限期改善；屆期未改善者，得按次處罰。情節重大或經處罰三次後仍未改善者，得令其停止收托兒童。居家托育人員違反收托人數規定，且收托人數五人以上者，亦適用前述加重處罰。"}, {"cat": "reg", "id": "A02", "title": "申請登記文件未備齊且屆期未補正", "law": "管理辦法第8條第3項", "summary": "申請托育服務登記文件、資料未備齊者，主管機關應書面限期補正；屆期未補正者，以書面駁回申請。", "effect": "尚未取得登記前不得提供托育服務；若仍收托，可能轉為未辦理登記即收托。", "penalty": "無直接罰鍰；若未登記即收托，依兒少權法第90條。", "fine": "否／轉為未登記收托時會", "improve": "是", "per": "否", "stop": "否", "transfer": "否", "revoke": "否", "public": "不符合準公共簽約資格", "future": ""}, {"cat": "reg", "id": "A03", "title": "服務登記證書未懸掛於明顯處", "law": "管理辦法第11條第2項", "summary": "提供在宅托育服務者，應將服務登記證書懸掛於服務登記處所足資辨識之明顯處。", "effect": "通常列入輔導或限期改善；屆期未改善可能作為後續處理紀錄。", "penalty": "多屬輔導改善，現行法未見直接專屬罰鍰。", "fine": "否／視後續改善", "improve": "是", "per": "否", "stop": "否", "transfer": "否", "revoke": "否", "public": "屢次未改善可能影響準公共評估", "future": ""}, {"cat": "reg", "id": "A04", "title": "服務登記證書有效期限屆滿未申請換發", "law": "管理辦法第12條", "summary": "服務登記證書有效期間為六年；屆滿前三個月內應申請換發；屆期未申請換發者，廢止其服務登記。", "effect": "廢止服務登記；若仍收托，可能變成未登記收托。", "penalty": "本項直接效果為廢止登記；未登記後仍收托再依兒少權法第90條。", "fine": "否／後續可能", "improve": "否", "per": "否", "stop": "可能", "transfer": "可能", "revoke": "是", "public": "準公共合作資格重大影響", "future": ""}, {"cat": "reg", "id": "A05", "title": "服務登記證書租借或轉讓他人", "law": "管理辦法第13條第1項；準公共要點第3點、第8點", "summary": "托育人員不得將服務登記證書租借或轉讓他人。", "effect": "最近二年違反第13條第1項，準公共不得簽約／不予續約；契約中發生亦可能終止契約。", "penalty": "現行管理辦法本身未列專屬罰鍰；但涉及準公共資格與後續行政處理。", "fine": "否／視情節", "improve": "視情節", "per": "否", "stop": "視情節", "transfer": "視情節", "revoke": "視情節", "public": "準公共作業要點第8點：若屬收托比違反法令規定，應即終止契約；並不得簽約／不予續約／可能終止契約", "future": ""}, {"cat": "reg", "id": "A06", "title": "證書記載事項變更未於30日內辦理", "law": "管理辦法第14條第1項；準公共要點第8點第7款", "summary": "姓名、性別、出生年月日、資格證明等服務登記證書記載事項有變更、遺失、毀損或滅失等情形時，應依規定期限申請變更、換發或補發。此項是證書記載事項變更，並非服務登記證書效期屆滿未申請換發。", "effect": "可列入改善；若為準公共合作對象，違反管理辦法第14條且經命限期改善達三次或科處罰鍰，可能依準公共作業要點第8點第7款終止準公共契約。", "penalty": "現行多依改善處理；若進入準公共作業要點第8點第7款條件，影響準公共契約。", "fine": "否／視情節", "improve": "是", "per": "否／視情節", "stop": "否", "transfer": "否", "revoke": "否", "public": "準公共作業要點第8點第7款：違反居家管理辦法第14條且經命限期改善達三次或科處罰鍰者，應即終止契約。", "future": ""}, {"cat": "reg", "id": "A07", "title": "服務登記處所變更未事先申請核准", "law": "管理辦法第14條第2項", "summary": "服務登記處所地址變更，應事先申請核准變更後，始得於變更後處所提供托育服務。", "effect": "未核准處所收托可能被列為登記處所不符；視情節要求停止、改善或另依未登記處所處理。", "penalty": "可能限期改善；若涉及未核准處所持續收托，可能衍生兒少權法第90條風險。", "fine": "視情節", "improve": "是", "per": "視情節", "stop": "可能", "transfer": "可能", "revoke": "視情節", "public": "需辦理契約變更，否則影響準公共", "future": ""}, {"cat": "reg", "id": "A08", "title": "停止或恢復托育服務未依規定辦理", "law": "管理辦法第15條", "summary": "托育人員停止托育服務應於30日內申請；恢復托育服務應經主管機關同意。", "effect": "未依規定停復托可列入輔導或改善；未經同意恢復收托則有資格與管理風險。", "penalty": "多屬輔導改善；若實際不符登記狀態仍收托，可能衍生裁處。", "fine": "否／視情節", "improve": "是", "per": "否", "stop": "可能", "transfer": "可能", "revoke": "視情節", "public": "可能影響準公共；若符合準公共作業要點第8點，應即終止契約", "future": ""}, {"cat": "reg", "id": "A09", "title": "開始、結束收托或收托異動未於7日內報備", "law": "管理辦法第16條", "summary": "開始或結束收托兒童、收托方式或收托時間異動，應依規定期限向主管機關或居家托育服務中心報備。", "effect": "可列入輔導或改善；若影響收托人數、收托比或準公共資料正確性，可能衍生其他處理。", "penalty": "多屬輔導改善；與準公共費用申報不符時另行處理。", "fine": "否／視情節", "improve": "是", "per": "否", "stop": "否", "transfer": "否", "revoke": "否", "public": "可能影響費用申報或準公共管理", "future": ""}, {"cat": "ratio", "id": "B04", "title": "未將托育人員未滿3歲子女或受監護者列入收托人數", "law": "管理辦法第7條第2項；兒少權法第90條；準公共作業要點第8點", "summary": "收托人數應以托育服務時間實際照顧兒童數計算，並包括托育人員未滿3歲子女與受其監護者。<br><br>管理辦法第7條：居家托育人員收托人數，半日托育、日間托育、延長托育或臨時托育合計至多4人，其中未滿2歲兒童至多2人；全日托育及夜間托育至多2人。收托人數應包含托育人員未滿3歲子女、受其監護者、三親等內未滿5歲兒童，以及未滿12歲且未收取托育費用之兒童；到宅托育以該住所或居所實際受照顧兒童人數計算。<br><br>兒少權法第90條：居家式托育服務提供者違反收托人數規定者，處新臺幣6,000元以上3萬元以下罰鍰，並得按次處罰；情節重大或經處罰三次後仍未改善者，得廢止登記。<br><br><strong>準公共作業要點第8點：</strong>合作對象擅自改變原收托條件或收托比違反法令規定，地方政府應即終止契約。", "effect": "若未列入導致超收，即屬違反收托人數規定。；若為準公共合作對象，亦屬準公共作業要點第8點收托比違反法令規定之退場情形。", "penalty": "違反收托人數規定者，6,000～30,000元；限期改善；屆期未改善得按次罰，情節重大或三次仍未改善得廢止登記。", "fine": "是", "improve": "是", "per": "是", "stop": "否／視情節", "transfer": "否", "revoke": "可能", "public": "準公共作業要點第8點：收托比違反法令規定，應即終止契約", "future":"若因此造成違反收托人數規定，兒童托育服務法亦有相關罰則。<br><strong>罰則：</strong>收托人數未滿5人者，依第78條第1項第2款，違反第13條第5項所定辦法中有關收托人數規定者，處新臺幣1萬元以上5萬元以下罰鍰，並令限期改善；屆期未改善者，得按次處罰；情節重大或經處罰三次後仍未改善者，得公布姓名及廢止登記。<br><br><strong>收托人數5人以上者：</strong>依第71條加重處罰，處新臺幣6萬元以上30萬元以下罰鍰，並令限期改善；屆期未改善者，得按次處罰；情節重大或經處罰三次後仍未改善者，得令其停止收托兒童。"}, {"cat": "ratio", "id": "B05", "title": "未將三親等內未滿5歲兒童列入收托人數", "law": "管理辦法第7條第2項；兒少權法第90條；準公共作業要點第8點", "summary": "收托人數應包括托育人員未滿5歲之三親等內兒童。<br><br>管理辦法第7條：居家托育人員收托人數，半日托育、日間托育、延長托育或臨時托育合計至多4人，其中未滿2歲兒童至多2人；全日托育及夜間托育至多2人。收托人數應包含托育人員未滿3歲子女、受其監護者、三親等內未滿5歲兒童，以及未滿12歲且未收取托育費用之兒童；到宅托育以該住所或居所實際受照顧兒童人數計算。<br><br>兒少權法第90條：居家式托育服務提供者違反收托人數規定者，處新臺幣6,000元以上3萬元以下罰鍰，並得按次處罰；情節重大或經處罰三次後仍未改善者，得廢止登記。<br><br><strong>準公共作業要點第8點：</strong>合作對象擅自改變原收托條件或收托比違反法令規定，地方政府應即終止契約。", "effect": "若未列入導致超收，即屬違反收托人數規定。；若為準公共合作對象，亦屬準公共作業要點第8點收托比違反法令規定之退場情形。", "penalty": "若因此造成實際收托人數超過規定，依兒少權法第90條第5項，處新臺幣6,000元以上3萬元以下罰鍰，並得按次處罰；情節重大或經處罰三次後仍未改善者，得廢止登記。：6,000～30,000元、限期改善、按次處罰、重大或三次仍未改善得廢止登記。", "fine": "是", "improve": "是", "per": "是", "stop": "否／視情節", "transfer": "否", "revoke": "可能", "public": "準公共作業要點第8點：收托比違反法令規定，應即終止契約", "future":"若因此造成違反收托人數規定，兒童托育服務法亦有相關罰則。<br><strong>罰則：</strong>收托人數未滿5人者，依第78條第1項第2款，違反第13條第5項所定辦法中有關收托人數規定者，處新臺幣1萬元以上5萬元以下罰鍰，並令限期改善；屆期未改善者，得按次處罰；情節重大或經處罰三次後仍未改善者，得公布姓名及廢止登記。<br><br><strong>收托人數5人以上者：</strong>依第71條加重處罰，處新臺幣6萬元以上30萬元以下罰鍰，並令限期改善；屆期未改善者，得按次處罰；情節重大或經處罰三次後仍未改善者，得令其停止收托兒童。"}, {"cat": "ratio", "id": "B06", "title": "未將未滿12歲且未收取托育費用兒童列入收托人數", "law": "管理辦法第7條第2項；兒少權法第90條；準公共作業要點第8點", rove": "是", "per": "否", "stop": "否", "transfer": "否", "revoke": "否", "public": "達條件可能影響準公共", "future": ""}, {"cat": "care", "id": "C05", "title": "未協助辦理兒童發展篩檢", "law": "管理辦法第3條第5款", "summary": "托育人員應協助辦理兒童發展之篩檢。", "effect": "可列入輔導改善；若影響兒童權益，可能加重處理。", "penalty": "視情節。", "fine": "否／視情節", "improve": "是", "per": "否", "stop": "否", "transfer": "否", "revoke": "否", "public": "達條件可能影響準公共", "future": ""}, {"cat": "care", "id": "C06", "title": "未優先考量兒童最佳利益或未專心托育", "law": "管理辦法第4條第1款", "summary": "托育人員應優先考量兒童最佳利益，並專心提供托育服務。", "effect": "違反第4條，若最近二年內經限期改善達二次以上或科處罰鍰，影響準公共；契約期間達條件可終止。", "penalty": "視個案改善或裁處；準公共依要點辦理。", "fine": "視情節", "improve": "是", "per": "視情節", "stop": "否／重大另評估", "transfer": "否", "revoke": "視情節", "public": "達條件不得簽約／不予續約／終止契約", "future": "第19條明定居家托育人員於托育服務時間應於托育服務處所專心托育，不得兼任其他職務、經營事業、從事影響托育服務之活動，也不得使六歲以下或需要特別看護之收托兒童獨處或由不適當之人代為照顧。<br><strong>罰則：</strong>依第78條，違反第19條規定者，處新臺幣1萬元以上5萬元以下罰鍰，並令限期改善；屆期未改善者，得按次處罰；情節重大或經處罰三次後仍未改善者，得公布姓名及廢止登記。"}, {"cat": "care", "id": "C07", "title": "未與家長訂定書面契約", "law": "管理辦法第4條第2款", "summary": "托育人員應與收托兒童父母、監護人或其他實際照顧者訂定書面契約。", "effect": "可列入輔導改善；準公共資料與費用爭議會受影響。", "penalty": "視情節。", "fine": "否／視情節", "improve": "是", "per": "否", "stop": "否", "transfer": "否", "revoke": "否", "public": "可能影響準公共；若符合準公共作業要點第8點，應即終止契約", "future": "第17條明定居家托育人員提供托育服務，應與送托兒童之法定代理人或實際照顧兒童之人訂定書面契約，並提供契約影本予居家托育服務中心；契約格式及內容由中央主管機關訂定定型化契約範本與應記載、不得記載事項。<br><strong>罰則一：</strong>未依第17條第1項訂定書面契約者，依第78條處新臺幣1萬元以上5萬元以下罰鍰，並令限期改善；屆期未改善者，按次處罰；情節重大或經處罰三次仍未改善者，得公布姓名及廢止登記。<br><strong>罰則二：</strong>訂定書面契約內容違反第17條第2項所定定型化契約範本與應記載、不得記載事項者，依第83條第2項，經主管機關令限期改善，屆期未改善者，處新臺幣6,000元以上3萬元以下罰鍰，並按次處罰。<br><strong>罰則三：</strong>未交付書面契約影本予居家托育服務中心者，依第84條，令限期改善，屆期未改善者，處新臺幣6,000元以上3萬元以下罰鍰，並按次處罰。"}, {"cat": "care", "id": "C08", "title": "洩漏收托兒童或家人個資", "law": "管理辦法第4條第3款", "summary": "托育人員對收托兒童及其家人個人資料應保密；經同意或依法通報、提供者除外。", "effect": "可列入違規改善；另可能涉及個資法責任。", "penalty": "依個案可能涉及其他法律責任；本工具先列托育管理違規。", "fine": "視情節", "improve": "是", "per": "視情節", "stop": "否", "transfer": "否", "revoke": "視情節", "public": "否／視情節；本 {"cat": "care", "id": "C17", "title": "托育服務時間使六歲以下或需要特別看護之收托兒童獨處，或由不適當之人代為照顧", "law": "現行：兒少權法第51條；管理辦法第4條第1款、第5條第1款；兒托法補充：第19條、第78條", "summary": "托育服務時間不得使六歲以下或需要特別看護之收托兒童獨處，也不得由不適當之人代為照顧；不適當之人包含無行為能力人、七歲以上未滿十二歲兒童，或依客觀事實足認有影響兒童身心健康或安全之虞者。", "effect": "高風險照顧事件；可能涉及未專心托育、疏忽照顧或兒童保護事件。", "penalty": "依具體情節處理；若涉及兒少保護事件，可能命停止服務、轉介或廢止登記。", "fine": "是／視情節", "improve": "是／視情節", "per": "是／視情節", "stop": "可能", "transfer": "可能", "revoke": "可能", "public": "準公共作業要點第8點：若屬居家管理辦法第5條違規經查證屬實，應即終止契約", "future": "第19條明定居家托育人員於托育服務時間應於托育服務處所專心托育，不得使六歲以下或需要特別看護之收托兒童獨處或由不適當之人代為照顧。<br><strong>罰則：</strong>依第78條，未依第19條規定於收托時間及托育服務處所專心托育者，處新臺幣1萬元以上5萬元以下罰鍰，並令限期改善；屆期未改善者，按次處罰；情節重大或經處罰三次仍未改善者，得公布姓名及廢止登記。"},
{"cat": "care", "id": "C18", "title": "兒童發生緊急傷病或事故傷害，未依救護原則處理", "law": "兒托法補充：第20條；現行可依兒童安全與照顧義務綜合判斷", "summary": "兒童發生緊急傷病或事故傷害時，居家托育人員應依主管機關訂定之救護原則，執行施救步驟、護送就醫、呼叫緊急救護專線支援等事項，並於家長或實際照顧者到達前採取必要處置。", "effect": "可能涉及照顧安全、事故處理及兒童最佳利益；若造成兒童權益受損，可能併依兒少保護或其他規定處理。", "penalty": "兒托法第20條本身未直接列入第78條居家托育人員立即罰鍰款項；但可能依後續子法、違規記點或個案情節處理。", "fine": "視情節", "improve": "是", "per": "視情節", "stop": "視情節", "transfer": "視情節", "revoke": "視情節", "public": "可能影響準公共及評估", "future": "第20條明定地方主管機關應訂定居家托育服務緊急傷病或事故傷害救護原則；兒童發生緊急傷病或事故傷害時，居家托育人員應依該原則執行施救、護送就醫、呼叫緊急救護專線等事項，並於家長或實際照顧者未到達前採取必要處置。<br><strong>罰則提醒：</strong>第20條未直接列入第78條居家托育人員立即罰鍰款項；實際裁處仍須依施行後子法、違規記點辦法及個案情節判斷。"},
{"cat": "care", "id": "C19", "title": "未交付書面契約影本予居家托育服務中心", "law": "兒托法補充：第17條、第84條", "summary": "居家托育人員除應與家長或實際照顧者訂定書面契約外，也應提供契約影本予居家托育服務中心。", "effect": "影響居托中心掌握收托資料、契約內容與後續爭議處理。", "penalty": "兒托法施行後，依第84條可令限期改善；屆期未改善者處6,000元以上3萬元以下罰鍰，並按次處罰。", "fine": "是", "improve": "是", "per": "是", "stop": "否／視情節", "transfer": "否", "revoke": "視情節", "public": "可能影響準公共管理", "future": "第17條第1項後段明定，居家托育人員應提供書面契約影本予居家托育服務中心。<br><strong>罰則：</strong>依第84條，未交付書面契約影本予居家托育服務中心者，令限期改善，屆期未改善者，處新臺幣6,000元以上3萬元以下罰鍰，並按次處罰。"},
{"cat": "care", "id": "C20", "title": "家長對托育服務方式或內容有意見，未提出說明或協議調整", "law": "兒托法補充：第21條", "summary": "家長或實際照顧者對居家托育人員提供之托育服務方式及內容有意見時，得請求托育人員提出說明，並得經雙方協議視需要修正或調整。", "effect": "可能衍生照顧爭議；建議作為輔導提醒與溝通紀錄項目。", "penalty": "第21條偏向托育說明與溝通機制，未直接列入第78條罰鍰款項。", "fine": "否／視情節", "improve": "是", "per": "否", "stop": "否", "transfer": "否", "revoke": "否／視情節", "public": "可能影響服務評估", "future": "第21條明定，兒童之法定代理人或實際照顧兒童之人對托育服務方式及內容有意見時，得請求居家托育人員提出說明，並得經雙方協議視需要修正或調整。<br><strong>罰則提醒：</strong>第21條未直接列入第78條居家托育人員立即罰鍰款項，較適合作為照顧爭議、輔導及溝通紀錄項目。"},
{"cat": "care", "id": "C21", "title": "知悉違法或不當對待事件，未於24小時內通報主管機關", "law": "現行：兒少權法第53條；兒托法補充：第59條、第78條", "summary": "執行業務時知悉兒童有違法或不當對待事件，應向直轄市、縣（市）主管機關通報，至遲不得超過24小時。", "effect": "影響兒童保護及主管機關即時介入；若同時涉及不當對待事件，應立即補行通報並配合調查。", "penalty": "兒托法施行後，居家托育人員未依第59條第1項通報者，依第78條處1萬元以上5萬元以下罰鍰，並令限期改善；屆期未改善按次處罰；情節重大或三次仍未改善者，得公布姓名及廢止登記。", "fine": "是", "improve": "是", "per": "是", "stop": "視情節", "transfer": "視情節", "revoke": "可能", "public": "重大影響；若符合準公共作業要點第8點，應即終止契約", "future": "第59條明定托育相關人員或居家托育服務中心工作人員於執行業務時，知悉涉有違法事件，應通報直轄市、縣（市）主管機關，至遲不得超過24小時。<br><strong>罰則：</strong>居家托育人員未依第59條第1項通報者，依第78條處新臺幣1萬元以上5萬元以下罰鍰，並令限期改善；屆期未改善者，按次處罰；情節重大或經處罰三次仍未改善者，得公布姓名及廢止登記。"},
{"cat": "inspect", "id": "E08", "title": "檢查時藉故藏匿兒童", "law": "現行：管理辦法第5條第4款、第19條；兒托法補充：第13條、第78條、第79條", "summary": "主管機關或居家托育服務中心進行監督及檢查時，不得規避、妨礙或拒絕；檢查時不得藉故藏匿兒童。", "effect": "屬重大檢查配合義務違反，可能影響收托人數查核與兒童安全。", "penalty": "兒托法施行後，居家托育人員違反者依第78條；居家托育人員以外之任何人違反者依第79條，均可能處1萬元以上5萬元以下罰鍰。", "fine": "是", "improve": "是／視情節", "per": "是／視情節", "stop": "視情節", "transfer": "視情節", "revoke": "可能", "public": "重大影響；若符合準公共作業要點第8點，應即終止契約", "future": "第13條第4項明定任何人不得規避、妨礙或拒絕主管機關及居家托育服務中心對居家托育人員之監督及檢查；檢查時不得藉故藏匿兒童。<br><strong>罰則一：</strong>居家托育人員違反者，依第78條處新臺幣1萬元以上5萬元以下罰鍰，並令限期改善；屆期未改善者，按次處罰；情節重大或經處罰三次仍未改善者，得公布姓名及廢止登記。<br><strong>罰則二：</strong>居家托育人員以外之任何人違反者，依第79條處新臺幣1萬元以上5萬元以下罰鍰。"}

{"cat": "register", "id": "A11", "title": "限期辦理登記或改善期間增加收托", "law": "現行：兒少權法第90條；兒托法補充：第75條", "summary": "居家托育人員於主管機關限期辦理登記或改善期間，不得增加收托兒童。", "effect": "屬未登記或登記管理違規的加重情形，主管機關可命停止收托、轉介兒童或強制轉介。", "penalty": "現行兒少權法第90條：限期改善期間增加收托兒童者，處新臺幣6,000元以上3萬元以下罰鍰，並得按次處罰。", "fine": "是", "improve": "是", "per": "是", "stop": "可能", "transfer": "可能", "revoke": "未登記者不屬廢止登記；已登記者視情節", "public": "不得簽約或可能終止契約", "future": "第75條針對居家托育人員未登記提供托育服務及限期辦理登記期間增加收托設有處罰。<br><strong>罰則提醒：</strong>限期辦理登記期間增加收托，兒托法罰鍰較現行兒少權法提高，可能處新臺幣2萬元以上10萬元以下罰鍰，並得命停止收托及轉介兒童。"},
{"cat": "register", "id": "A12", "title": "租借、轉讓或借用托育服務證書", "law": "現行：管理辦法第13條；兒托法補充：第62條、第74條", "summary": "托育人員不得將托育服務證書或資格證明文件租借、轉讓或提供他人使用，也不得借用他人證書辦理或提供服務。", "effect": "影響托育資格真實性與管理秩序，可能涉及資格不實、未登記或違法收托。", "penalty": "現行可依管理辦法及主管機關管理處分處理；若因此造成無照或未登記收托，另依兒少權法第90條處理。", "fine": "是／視情節", "improve": "是／視情節", "per": "視情節", "stop": "可能", "transfer": "可能", "revoke": "可能", "public": "不得簽約或可能終止契約", "future": "第62條明定不得租借托育服務證書或資格證明文件予他人使用。<br><strong>罰則：</strong>依第74條，個人租借證書或資格證明文件予他人使用者，處新臺幣3萬元以上15萬元以下罰鍰；涉及機構租借他人證書者，依機構相關罰則處理。"},

function qs(s){return document.querySelector(s)} function qsa(s){return Array.from(document.querySelectorAll(s))}
function setStep(n){
 ["p1","p2","p3"].forEach((id,i)=>qs("#"+id).classList.toggle("active",i===n-1));
 ["s1","s2","s3"].forEach((id,i)=>{
  let e=qs("#"+id);
  e.className="step";
  if(i===n-1)e.classList.add("active");
  else if(i<n-1)e.classList.add("done");
 });
 setTimeout(()=>{
  const target=document.querySelector(".container") || document.body;
  target.scrollIntoView({behavior:"smooth", block:"start"});
  window.scrollTo({top:0, behavior:"smooth"});
 },80);
}

function selectedCats(){return qsa(".cat:checked").map(i=>i.value)}
function go1(){setStep(1)}
function go2(){
 if(!selectedCats().length){alert("請至少選擇一項問題類型。");return}

function itemPriority(it){
 const text = ((it.title||"")+" "+(it.law||"")+" "+(it.summary||"")+" "+(it.effect||"")+" "+(it.penalty||"")+" "+(it.public||"")+" "+(it.revoke||"")+" "+(it.stop||"")+" "+(it.transfer||""));
 let score = 0;
 if(/應即終止契約|終止契約|不得簽約|不予續約|退準公|第8點|第八點/.test(text)) score += 100;
 if(/廢止登記|廢止其登記/.test(text)) score += 90;
 if(/停止服務|命其停止|停止收托|暫停新收托/.test(text)) score += 80;
 if(/強制轉介|轉介/.test(text)) score += 70;
 if(/罰鍰|[0-9０-９]+萬|6萬|30萬|60萬|6000|6,000|3萬元|5萬元/.test(text)) score += 40;
 if(/限期改善|按次處罰/.test(text)) score += 20;
 return score;
}
function itemBadges(it){
 const text = ((it.title||"")+" "+(it.law||"")+" "+(it.summary||"")+" "+(it.effect||"")+" "+(it.penalty||"")+" "+(it.public||"")+" "+(it.revoke||"")+" "+(it.stop||"")+" "+(it.transfer||""));
 let badges = [];
 const add = (cls, label) => { if(!badges.some(b=>b.label===label)) badges.push({cls,label}); };
 if(/應即終止契約|終止契約|不得簽約|不予續約|退準公|第8點|第八點/.test(text)) add("critical","退準公／終止契約");
 if(/廢止登記|廢止其登記/.test(text)) add("critical","可能廢止登記");
 if(/停止服務|命其停止|停止收托|暫停新收托/.test(text)) add("critical","可能停止服務");
 if(/強制轉介|轉介/.test(text)) add("warn","可能轉介");
 if(/罰鍰|[0-9０-９]+萬|6萬|30萬|60萬|6000|6,000|3萬元|5萬元/.test(text)) add("warn","有罰鍰");
 if(/限期改善|按次處罰/.test(text)) add("info","限改／按次");
 return badges;
}
function itemBadgeHtml(it){
 const badges = itemBadges(it);
 if(!badges.length) return "";
 return `<div class="item-badges">${badges.map(b=>`<span class="item-badge ${b.cls}">${b.label}</span>`).join("")}</div>`;
}
function itemClassByPriority(it){
 const s = itemPriority(it);
 if(s >= 90) return "item item-critical";
 if(s >= 40) return "item item-warn";
 return "item item-normal";
}

function renderDetails(){let cats=selectedCats(),kw="",area=qs("#details");area.innerHTML="";cats.forEach(cid=>{let c=categories.find(x=>x.id===cid);let block=document.createElement("div");block.className="block";block.innerHTML=`<h2>${c.title}</h2><div class="helper">${c.sub}</div>`;
if(cid==="ratio"){block.innerHTML+=`<div class="count-box"><div class="count-title">收托人數填寫</div><div class="count-note">請填同一時段實際照顧人數。系統會將半日／日間／延長／臨時托育合併計算，並依管理辦法第7條附表，比對全日、夜間及其他托育方式的合法組合；達5人以上會補充兒托法第71條（尚未實施）。</div><table class="count-table"><thead><tr><th></th><th>未滿2歲</th><th>2歲以上</th></tr></thead><tbody>${["半日托育","日間托育","夜間托育","全日托育","延長托育","臨時托育"].map((n,i)=>`<tr><td>${n}</td><td><input type="number" min="0" step="1" class="count-input u2" data-row="${i}"></td><td><input type="number" min="0" step="1" class="count-input o2" data-row="${i}"></td></tr>`).join("")}</tbody></table></div>`}
let fs=items.filter(it=>it.cat===cid && (!kw || (it.title+it.law+it.summary).includes(kw)));
fs.sort((a,b)=>itemPriority(b)-itemPriority(a) || a.title.localeCompare(b.title,"zh-Hant"));
block.innerHTML+=`<div class="priority-note">已優先排序：退準公／廢止登記／停止服務／罰鍰等高風險項目會排在前面並以顏色標示。</div>`;
fs.forEach(it=>{let l=document.createElement("label");l.className=itemClassByPriority(it);l.innerHTML=`<input type="checkbox" class="detail" value="${it.id}"><div><div class="ct">${it.title}</div><div class="cs">${it.law}</div>${itemBadgeHtml(it)}</div>`;block.appendChild(l)});if(!fs.length) block.innerHTML+=`<div class="empty">沒有符合的細項。</div>`;area.appendChild(block)})}
function num(sel,row){
 let e=qs(`${sel}[data-row="${row}"]`);
 if(!e)return 0;
 let value=Number(e.value||0);
 if(!Number.isFinite(value)||value<0)return 0;
 return Math.floor(value);
}
function hasCountInput(){
 if(!selectedCats().includes("ratio"))return false;
 return qsa(".count-input").some(e=>Number(e.value||0)>0);
}
function countSnapshot(){
 const names=["半日托育","日間托育","夜間托育","全日托育","延長托育","臨時托育"];
 const rows=names.map((name,row)=>{
  const u=num(".u2",row),o=num(".o2",row);
  return {name,row,u,o,total:u+o};
 });
 const shortRows=[rows[0],rows[1],rows[4],rows[5]];
 const shortU=shortRows.reduce((sum,r)=>sum+r.u,0);
 const shortO=shortRows.reduce((sum,r)=>sum+r.o,0);
 const full=rows[3];
 const night=rows[2];
 const longU=full.u+night.u;
 const longO=full.o+night.o;
 return {
  rows,
  shortU,
  shortO,
  shortTotal:shortU+shortO,
  fullU:full.u,
  fullO:full.o,
  fullTotal:full.total,
  nightU:night.u,
  nightO:night.o,
  nightTotal:night.total,
  longU,
  longO,
  longTotal:longU+longO,
  totalU:shortU+longU,
  totalO:shortO+longO,
  total:shortU+shortO+longU+longO
 };
}
function countEntrySummary(c){
 const entered=c.rows.filter(r=>r.total>0).map(r=>`${r.name}：未滿2歲 ${r.u} 人、2歲以上 ${r.o} 人`).join("；");
 return entered||"未填寫收托人數";
}
function autoCounts(){
 if(!selectedCats().includes("ratio"))return [];
 const c=countSnapshot();
 if(c.total<=0)return [];
 const reasons=[];
 const addReason=text=>{if(!reasons.includes(text))reasons.push(text)};

 // 第7條附表：半日、日間、延長、臨時須合併計算。
 if(c.shortTotal>4){
  addReason(`半日、日間、延長及臨時托育合計 ${c.shortTotal} 人，超過至多4人。`);
 }
 if(c.shortU>2){
  addReason(`半日、日間、延長及臨時托育的未滿2歲兒童合計 ${c.shortU} 人，超過至多2人。`);
 }

 // 全日及夜間名額也必須合併檢視。
 if(c.longTotal>2){
  addReason(`全日及夜間托育合計 ${c.longTotal} 人，超過附表可容許的2人。`);
 }

 // 附表各種混合組合均以同一時段未滿2歲兒童至多2人為上限。
 if(c.totalU>2){
  addReason(`同一時段實際照顧的未滿2歲兒童合計 ${c.totalU} 人，不符合第7條附表的年齡組合限制。`);
 }

 // 已有1名全日或夜間兒童時，其他短時托育最多再2人。
 if(c.longTotal===1&&c.shortTotal>2){
  addReason(`已有1名全日或夜間托育兒童時，半日、日間、延長及臨時托育最多再收2人；目前為 ${c.shortTotal} 人。`);
 }

 // 已有2名全日／夜間兒童時，須依附表進一步比對。
 if(c.longTotal>=2){
  if(c.fullTotal>0&&c.shortTotal>0){
   addReason(`全日與夜間托育合計已達 ${c.longTotal} 人，且其中包含全日托育，不得再同時收托半日、日間、延長或臨時托育兒童。`);
  }else if(c.fullTotal===0&&c.shortTotal>c.nightO){
   addReason(`夜間托育共 ${c.nightTotal} 人時，可再收的半日、日間、延長或臨時托育人數，最多等於其中2歲以上夜間托育兒童人數 ${c.nightO} 人；目前另收 ${c.shortTotal} 人。`);
  }
 }

 if(!reasons.length)return [];
 const summary=`<strong>填寫情形：</strong>${countEntrySummary(c)}<br><br><strong>不符合原因：</strong><br>${reasons.map((r,i)=>`${i+1}. ${r}`).join("<br>")}`;
 return [autoItem("收托人數組合不符第7條附表",summary,c.total)];
}

}
function publicRuleParts(it){
 const law = it.law || "";
 const title = it.title || "";
 const pub = it.public || "";
 const effect = it.effect || "";
 const penalty = it.penalty || "";
 const summary = it.summary || "";
 const text = law + " " + title + " " + pub + " " + effect + " " + penalty + " " + summary;
 let parts = [];
 const add = (key, text) => { if(!parts.some(p => p.key === key)) parts.push({key, text}); };

 // 第3點：簽約資格、不得簽約、續約資格等
 if(text.includes("第3點") || text.includes("不得簽約") || text.includes("不予續約") || text.includes("最近二年")){
   add("準公共作業要點第3點：", "準公共合作對象須符合簽約資格與消極資格限制；若有違反兒少權法、居家管理辦法、收費規定、托育品質或其他作業要點所列不得簽約情形，可能不得申請簽約或不予續約。");
 }

 // 第8點：應即終止契約
 if(text.includes("第8點") || text.includes("第八點") || text.includes("應即終止契約") || text.includes("終止契約")){
   if(title.includes("收托") || title.includes("收托比") || title.includes("人數") || law.includes("管理辦法第7條") || text.includes("收托比違反")){
     add("準公共作業要點第8點：", "準公共合作對象擅自改變原收托條件或收托比違反法令規定者，地方政府應即終止契約。");
   } else if(title.includes("收費") || title.includes("費用") || title.includes("超收") || text.includes("額外費用") || text.includes("調高費用")){
     add("準公共作業要點第8點：", "準公共合作對象擅自調高費用、收取額外費用，或收取收退費基準以外費用者，地方政府應即終止契約。");
   } else if(title.includes("檢查") || title.includes("拒") || title.includes("藏匿") || text.includes("規避") || text.includes("妨礙")){
     add("準公共作業要點第8點：", "準公共合作對象規避、妨礙或拒絕管理、輔導、監督及檢查者，地方政府應即終止契約。");
   } else if(title.includes("不當") || title.includes("虐待") || title.includes("疏忽") || title.includes("兒童保護") || law.includes("兒少權法第49條") || law.includes("管理辦法第5條")){
     add("準公共作業要點第8點：", "準公共合作對象違反兒少權法第49條，或違反居家管理辦法第5條、第7條、第13條第1項規定之一，經查證屬實者，地方政府應即終止契約。");
   } else if(title.includes("停托") || title.includes("換發") || title.includes("效期") || title.includes("退出") || title.includes("退準公")){
     add("準公共作業要點第8點：", "準公共合作對象停托、服務登記證書效期屆滿未申請換發，或有作業要點所列契約終止事由者，地方政府應依規定終止契約。");
   } else {
     add("準公共作業要點第8點：", "合作對象有準公共作業要點第8點所列情形之一者，地方政府應即終止契約。");
   }
 }

 // 第24點：獎助減列/補助處理
 if(text.includes("第24點") || text.includes("減列") || text.includes("獎助") || text.includes("營運費") || text.includes("設施設備")){
   add("準公共作業要點第24點：", "準公共合作對象如違反相關法令或作業要點，經主管機關處罰或命限期改善，設施設備費、營運費或其他獎助得依作業要點於當年度或次年度減列；減列比例、期間及適用對象依地方政府及作業要點認定。");
 }

 // 退出準公共：60日提前通知/退出程序（若文字有60日、退出、退準公）
 if(text.includes("60") || text.includes("六十") || title.includes("退出") || title.includes("退準公") || title.includes("終止合作")){

 }

 // 泛用提醒：有準公共但未命中特定點
 if(!parts.length && hasPublicRule(it)){
   add("準公共作業要點：", "本項涉及準公共合作資格或契約管理，應檢視準公共作業要點及契約約定，判斷是否有不得簽約、不予續約、應即終止契約、獎助減列、補助停止或追繳等處分效果。");
 }
 return parts;
}

function penaltyFocus(it){
 const fineText = (it.fine && it.fine.includes("是")) ? (it.penalty || "有罰鍰，金額依個案") : (it.fine || "視個案");
 const revokeText = it.revoke || "視個案";

 const fineCritical = (it.fine && it.fine.includes("是")) || (it.penalty && /罰鍰|元|萬/.test(it.penalty));
 const revokeCritical = /廢止|可能|是/.test(revokeText);
 const publicCritical = /終止|第8點|第八點|不得簽約|不予續約|減列|停止|追繳|退出|退準公|補助/.test(publicText);
 return `<div class="focus-box">
   <div class="focus-title">⚠️ 重點檢視：罰鍰／廢止／退準公</div>
   <div class="focus-grid">
    <div class="focus-item ${fineCritical ? "focus-critical" : ""}"><strong>是否罰鍰／金額</strong>${highlightPenaltyText(fineText)}</div>
    <div class="focus-item ${revokeCritical ? "focus-critical" : ""}"><strong>是否廢止登記</strong>${highlightPenaltyText(revokeText)}</div>
    <div class="focus-item ${publicCritical ? "focus-critical" : ""}"><strong>準公共影響</strong>${highlightPenaltyText(publicText)}</div>
   </div>
  </div>`;
}



function highlightPenaltyText(text){
 if(text === undefined || text === null) return "";
 let s = String(text);
 const patterns = [
  "廢止登記",
  "廢止其登記",
  "廢止設立許可",
  "停止服務",
  "停止收托",
  "暫停新收托",
  "命其停止",
  "令其停止",
  "應即終止契約",
  "終止契約",
  "不得簽約",
  "不予續約",
  "強制轉介",
  "轉介收托兒童",
  "罰則","罰鍰",
  "罰鍰金額",
  "處新臺幣",
  "處臺幣",
  "處6萬",
  "處 6萬",
  "處1萬",
  "處 1萬",
  "處6,000",
  "處 6,000",
  "按次處罰",
  "限期改善",
  "公布姓名",
  "公布行為人姓名",
  "記違規點數"
 ];
 patterns.forEach(p=>{
   const esc = p.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
   s = s.replace(new RegExp(esc, "g"), `<span class="penalty-key">${p}</span>`);
 });
 // 金額區間也標紅
 s = s.replace(/(新臺幣)?([0-9,]+元以上[0-9,]+萬元?以下|[0-9]+萬元以上[0-9]+萬元以下|[0-9,]+元以上[0-9,]+元以下)/g, '<span class="penalty-key">$&</span>');

 // v38補強：標示簡寫罰鍰金額，例如「6,000～30,000」「6,000~30,000」「6,000元～30,000元」
 s = s.replace(/([0-9,]+(?:元)?\s*[～~－-]\s*[0-9,]+(?:元)?)/g, '<span class="penalty-key">$&</span>');
 // v38補強：標示單一罰鍰金額，例如「3萬元」「30,000元」「6,000元」「6萬～30萬元」
 s = s.replace(/([0-9,]+(?:元|萬元|萬))/g, '<span class="penalty-key">$&</span>');
 return s;
}
function highlightArticleHtml(html){
 if(!html) return "";
 return String(html).replace(/<span>(.*?)<\/span>/g, (m, inner)=>`<span>${highlightPenaltyText(inner)}</span>`);
}

 const futureRules={
  A01:`<strong>兒托法第75條：</strong>不具資格而提供服務者，處2萬元以上10萬元以下罰鍰，並令停止收托及立即轉介；具資格但未登記，或暫停收托期間仍提供服務者，先處1萬元以上5萬元以下並限期辦理登記，屆期未辦理再處2萬元以上10萬元以下並命轉介。限期辦理登記期間增加收托者，處2萬元以上10萬元以下並按次處罰。`,
  A11:`<strong>兒托法第75條第5項：</strong>限期辦理登記期間增加收托者，處2萬元以上10萬元以下罰鍰並按次處罰，主管機關並應強制轉介其增加收托之兒童。`,
  A03:`<strong>兒托法第14條：</strong>提供在宅托育服務者，應將居家托育服務證書懸掛於服務登記處所明顯處；本條未直接列入第78條立即罰鍰項目。`,
  A04:`<strong>兒托法第13條第5項：</strong>證書效期與換發細節將由後續居家托育管理辦法規定；不得錯套第62條租借證書罰則。`,
  A05:`<strong>兒托法第62條、第74條：</strong>不得租借托育服務證書或資格證書予他人使用；違反者處3萬元以上15萬元以下罰鍰，並令限期改善，屆期未改善按次處罰。新法文字為「租借」，轉讓或借用他人證書仍須依具體行為及後續子法判斷。`,
  A06:`<strong>新法銜接：</strong>兒托法第23條規定居家托育服務中心受理證書申請、變更及換發；具體期限與處理效果仍待第13條第5項授權辦法明定。`,
  A07:`<strong>新法銜接：</strong>服務處所變更的申請與核准細節，仍待兒托法第13條第5項授權辦法明定。`,
  A08:`<strong>兒托法第13條第2項：</strong>有暫停收托服務需要時，應向主管機關申請暫停；後續程序與效果仍待授權辦法。`,
  A09:`<strong>兒托法第23條：</strong>居家托育服務中心受理居家托育人員收托異動通報；具體期限及處理效果仍待相關辦法。`,
  A10:`<strong>兒托法第13條：</strong>暫停、恢復收托的具體程序仍待第13條第5項授權辦法；不得先行套用租借證書或拒檢罰則。`,
  B04:`<strong>兒托法第71條、第78條：</strong>違反未來收托人數辦法，收托達5人以上者處6萬元以上30萬元以下；其他違反收托人數規定者處1萬元以上5萬元以下。兩者均有後續限改、按次及廢止登記規定。`,
  B05:`<strong>兒托法第71條、第78條：</strong>須先依施行後的收托人數辦法確認是否實際超收，再依是否達5人分流裁罰。`,
  B06:`<strong>兒托法第71條、第78條：</strong>須先依施行後的收托人數辦法確認是否實際超收，再依是否達5人分流裁罰。`,
  B07:`<strong>兒托法第71條、第78條：</strong>須先依施行後的收托人數辦法確認是否實際超收，再依是否達5人分流裁罰。`,
  B08:`<strong>兒托法第13條、第81條：</strong>共同托育及主要照顧人的詳細規則仍待授權辦法；如屬輔導或管理規定，經限期改善而屆期未改善時，才依第81條處理。`,
  C06:`<strong>兒托法第19條、第78條：</strong>收托時間應於托育服務處所專心托育；違反者處1萬元以上5萬元以下罰鍰並令限期改善，屆期未改善按次處罰。`,
  C07:`<strong>兒托法第17條、第78條、第83條、第84條：</strong>未訂書面契約、契約內容不符定型化規定、未交付契約影本，分別適用不同成立要件與罰則，不可合併成同一立即罰鍰。`,
  C08:`<strong>兒托法第65條、第74條：</strong>托育相關人員應對兒童及其法定代理人或實際照顧者資料保密；違反者處3萬元以上15萬元以下罰鍰並令限期改善。`,
  C09:`<strong>兒托法第63條、第84條：</strong>每年完成18小時以上專業知能研習，每二年研習應包含性別平等課程；並須於規定期間完成8小時以上兒童基本救命術、3小時以上事故傷害預防及處理<strong>及</strong>一次以上緊急救護情境演習。第84條採先限期改善、屆期未改善再罰。`,
  C11:`<strong>兒托法第18條、第78條：</strong>應於收托兒童當日前完成投保專業責任保險；違反者處1萬元以上5萬元以下罰鍰並令限期改善。`,
  C12:`<strong>兒托法第47條、第56條、第69條、第76條：</strong>不當對待依行為及情節分流；身心虐待或情節重大者處6萬元以上60萬元以下並公布姓名。符合第56條第4項情形者，應停止服務、立即轉介，已登記者廢止登記。`,
  C13:`<strong>兒托法第19條、第78條：</strong>收托時間不得兼任其他職務、經營事業或從事影響托育的活動；違反者處1萬元以上5萬元以下並令限期改善。`,
  C18:`<strong>兒托法第20條：</strong>應依地方主管機關訂定的救護原則處理緊急傷病或事故傷害；本條未直接列入第78條立即罰鍰項目。`,
  C19:`<strong>兒托法第17條、第84條：</strong>未交付書面契約影本予居家托育服務中心者，先令限期改善，屆期未改善處6,000元以上3萬元以下並按次處罰。`,
  C20:`<strong>兒托法第21條：</strong>家長得請求托育人員提出服務說明，雙方得協議調整；本條未設直接罰鍰。`,
  C26:`<strong>兒托法第19條、第78條：</strong>托育服務時間不得使六歲以下或需要特別看護的收托兒童獨處或由不適當之人照顧；違反者處1萬元以上5萬元以下並令限期改善。`,
  C27:`<strong>兒托法第59條、第78條：</strong>知悉第57條第1項所定違法事件，至遲24小時內通報；居家托育人員違反者處1萬元以上5萬元以下並令限期改善。`,
  D01:`<strong>兒托法第16條、第78條：</strong>不得收取地方主管機關公告收費、退費項目及金額基準以外費用；違反者處1萬元以上5萬元以下並令限期改善。`,
  D02:`<strong>兒托法第15條、第16條、第78條：</strong>須以施行後臺南市公告的收退費基準判斷，不得沿用過期金額。`,
  D03:`<strong>兒托法第16條、第78條：</strong>超出地方公告收退費項目或金額基準者，處1萬元以上5萬元以下並令限期改善。`,
  D04:`<strong>兒托法第71條、第78條：</strong>若同時構成收托人數違規，依是否達5人分流；準公共契約終止仍屬現行作業要點效果。`,
  E01:`<strong>兒托法第13條、第78條、第79條：</strong>居家托育人員拒絕監督檢查或藏匿兒童，依第78條處1萬元以上5萬元以下；其他行為人依第79條處理。`,
  E02:`<strong>兒托法第68條、第85條：</strong>無正當理由不配合訪視、輔導、檢查或不提供相關資料者，處6,000元以上3萬元以下並按次處罰；若同時構成第13條第4項拒檢，另依第78條分流。`,
  E03:`<strong>兒托法第68條、第85條：</strong>須先確認是否無正當理由不提供資料；成立時處6,000元以上3萬元以下並按次處罰。`,
  E04:`<strong>兒托法第68條、第85條：</strong>「未提供證明」不等於「未完成訓練或健康檢查」；應分別查明後再適用資料配合或訓練規定。`,
  E05:`<strong>兒托法第81條：</strong>違反第13條第5項辦法中的輔導或管理規定，須先經限期改善且屆期未改善，才處6,000元以上3萬元以下並按次處罰。`,
  E06:`<strong>兒托法第56條、第61條、第71條：</strong>未依主管機關命令停止服務、暫停收托或轉介時，依命令來源與構成要件分流；第71條重大或三次處罰仍未改善者為廢止登記。`,
  E07:`<strong>兒托法第75條：</strong>拒不配合未登記案件的轉介命令者，處2萬元以上10萬元以下，主管機關並應強制轉介。`,
  E08:`<strong>兒托法第13條、第78條、第79條：</strong>新法已明文禁止檢查時藉故藏匿兒童；居家托育人員與其他行為人分別適用第78條、第79條。`,
  E09:`<strong>兒托法第86條：</strong>達法定記點門檻時，主管機關<strong>應命</strong>暫停一定期間的新收托服務；五年內暫停新收托達二次，再違規且遭記點者，廢止登記。`,
  D10:`<strong>新法提醒：</strong>準公共退出期限仍屬準公共作業要點及合作契約管理，不因兒托法公布即自動變成罰鍰。`
 };

 futureText=function(it){
  if(it&&it.futureOverride)return it.futureOverride;
  if(it&&String(it.id||"").startsWith("auto_count"))return it.future||"";
  return futureRules[it&&it.id]||"已公布的兒童托育服務法未就本項設置可直接套用的獨立條文；如涉及第13條授權事項，仍須等待施行後子法確認，不以關鍵字推測罰則。";
 };

 articleSummary=function(it){
  return `<div class="article-summary"><div class="article-row"><strong>條文重點：</strong><span>${it.summary||""}</span></div></div>`;
 };
 publicImpactText=function(it){return it.public||"本項未設定準公共直接效果，須依具體事實與合作契約判斷。";};
 hasPublicPoint8=function(it){return ["terminate_now","terminate_conditional","fact_pending"].includes(it&&it.publicStatus);};
 publicRuleParts=function(it){return it&&it.public?[{key:"準公共效果：",text:it.public}]:[];};

 function fineKind(it){
  if(it.futureOnly)return "future";
  if(it.fineLevel)return it.fineLevel;
  const f=String(it.fine||"");
  if(/^是/.test(f))return "direct";
  if(/視情節|可能|轉為/.test(f))return "fact_pending";
  return "none";
 }
 itemPriority=function(it){
  if(it.futureOnly)return 5;
  let score=0;
  if(it.publicStatus==="terminate_now")score+=100;
  else if(it.publicStatus==="terminate_conditional")score+=55;
  if(it.currentRevoke===true||it.revoke==="是")score+=90;
  if(fineKind(it)==="direct")score+=45;
  else if(["conditional","fact_pending"].includes(fineKind(it)))score+=20;
  if(String(it.stop||"").startsWith("是"))score+=40;
  return score;
 };
 itemBadges=function(it){
  const badges=[];const add=(cls,label)=>{if(!badges.some(x=>x.label===label))badges.push({cls,label});};
  if(it.futureOnly){add("future","新法預覽");return badges;}
  if(it.publicStatus==="terminate_now")add("critical","準公共應即終止");
  if(it.publicStatus==="terminate_conditional")add("conditional","準公共有成立門檻");
  if(it.publicStatus==="fact_pending")add("conditional","準公共待確認事實");
  if(it.publicStatus==="application_bar")add("warn","不得簽約／不予續約");
  if(it.currentRevoke===true||it.revoke==="是")add("critical","廢止登記");
  const fk=fineKind(it);
  if(fk==="direct")add("warn","現行有罰鍰");
  if(fk==="conditional")add("conditional","須先符合裁罰前提");
  if(fk==="fact_pending")add("conditional","須先查明事實");
  return badges;
 };
 itemBadgeHtml=function(it){const badges=itemBadges(it);return badges.length?`<div class="item-badges">${badges.map(b=>`<span class="item-badge ${b.cls}">${b.label}</span>`).join("")}</div>`:"";};
 itemClassByPriority=function(it){const s=itemPriority(it);if(s>=90)return "item item-critical";if(s>=20)return "item item-warn";return "item item-normal";};

 renderDetails=function(){

   const c=categories.find(x=>x.id===cid),block=document.createElement("div");block.className="block";
   block.innerHTML=`<h2>${c.title}</h2>`;
   if(cid==="ratio"){
    block.innerHTML+=`<div class="count-box">
     <div class="count-title">收托人數填寫</div>
     <div class="count-note">請填同一時段「實際照顧」的全部兒童。未滿3歲子女、受監護者、三親等內未滿5歲兒童及未收費未滿12歲兒童，也必須計入。</div>
     <div class="count-config">
      <div class="config-field"><label for="careModel">托育型態</label><select id="careModel"><option value="single">單一托育人員</option><option value="joint">二名以上共同托育</option></select></div>
      <div class="config-field"><label for="ownUnder3">是否有未滿3歲子女或受監護者同時受照顧</label><select id="ownUnder3"><option value="no">沒有</option><option value="yes">有，需依附表第三部分覆核</option></select></div>
     </div>
     <table class="count-table"><thead><tr><th></th><th>未滿2歲</th><th>2歲以上</th></tr></thead><tbody>${["半日托育","日間托育","夜間托育","全日托育","延長托育","臨時托育"].map((n,i)=>`<tr><td>${n}</td><td><input type="number" min="0" step="1" class="count-input u2" data-row="${i}"></td><td><input type="number" min="0" step="1" class="count-input o2" data-row="${i}"></td></tr>`).join("")}</tbody></table>
     <label class="check-line"><input id="countIncluded" type="checkbox"><span>我已將同一時段實際照顧的未滿3歲子女、受監護者、三親等內未滿5歲兒童及未收費未滿12歲兒童計入上表。</span></label>
     <label class="check-line"><input id="mainCareAssigned" type="checkbox"><span>若為共同托育，已為每名兒童分配主要照顧人（單一托育人員可不勾）。</span></label>
    </div>`;
   }
   if(cid==="fee"){
    const ref=items.find(x=>x.id==="D09");
    block.innerHTML+=`<details class="law-reference"><summary>查看：準公共第8點居家托育退場規則</summary><div>${ref?ref.summary:""}</div></details>`;
   }
   const fs=items.filter(it=>it.cat===cid&&!it.referenceOnly).sort((a,b)=>itemPriority(b)-itemPriority(a)||a.title.localeCompare(b,"zh-Hant"));
   fs.forEach(it=>{const l=document.createElement("label");l.className=itemClassByPriority(it);l.innerHTML=`<input type="checkbox" class="detail" value="${it.id}"><div><div class="ct">${it.title}</div><div class="cs">${it.law}</div>${itemBadgeHtml(it)}</div>`;block.appendChild(l);});
   area.appendChild(block);
  });
 };

 function reviewItem(title,summary){return {cat:"ratio",id:"review_"+title,title,law:"管理辦法第7條及附表",summary,effect:"目前資料不足，不產生違法或罰鍰結論。",penalty:"無；請補足資料或依附表人工覆核。",fine:"否",fineLevel:"none",improve:"—",per:"—",stop:"—",transfer:"—",revoke:"—",public:"資料不足，暫不判定準公共效果。",publicStatus:"none",neutral:true,futureOverride:"新法施行後仍須依第13條第5項授權辦法確認收托人數規則。"};}
 autoItem=function(title,summary,total){return {cat:"ratio",id:"auto_count_"+title,title,law:"管理辦法第7條及附表；兒少權法第90條第5項；準公共作業要點第8點",summary,effect:"確認違反現行收托人數或附表組合規定；準公共合作對象應即終止契約。",penalty:"依兒少權法第90條第5項，處6,000元以上3萬元以下罰鍰，並得按次處罰；情節重大或三次處罰後仍未改善者，得廢止登記。",fine:"是",fineLevel:"direct",improve:"是（管理辦法第18-1條）",per:"是",stop:"視情節",transfer:"視情節",revoke:"可能",public:"收托比或收托人數違反法令規定，準公共作業要點第8點第2款規定應即終止契約。",publicStatus:"terminate_now",future:total>=5?"兒托法施行後，違反收托人數規定且達5人以上者，依第71條處6萬元以上30萬元以下，並令限期改善；屆期未改善按次處罰，情節重大或三次處罰仍未改善者，廢止登記。":"兒托法施行後，違反第13條第5項辦法中的收托人數規定，依第78條處1萬元以上5萬元以下並令限期改善；實際仍須依施行後子法確認。"};};
 autoCounts=function(){
  if(!selectedCats().includes("ratio"))return [];
  const c=countSnapshot();if(c.total<=0)return [];
  if(!qs("#countIncluded")||!qs("#countIncluded").checked)return [reviewItem("收托人數資料尚未確認完整",`<strong>填寫情形：</strong>${countEntrySummary(c)}<br><br>尚未確認是否已把依法必須計入的其他兒童納入，因此暫不判定是否合法。`)];
  if(qs("#ownUnder3")&&qs("#ownUnder3").value==="yes")return [reviewItem("有未滿3歲子女或受監護者，需依附表第三部分覆核",`<strong>填寫情形：</strong>${countEntrySummary(c)}<br><br>附表對未滿3歲子女另依年齡、是否家外送托及列入全日或夜間名額設有不同組合，本版不冒然以一般加總判定。`)];
  const model=qs("#careModel")?qs("#careModel").value:"single",reasons=[];
  const add=t=>{if(!reasons.includes(t))reasons.push(t);};
  if(model==="joint"){
   if(c.total>4)add(`共同托育同一時段實際照顧共 ${c.total} 人，超過至多4人。`);
   if(c.longTotal>2)add(`共同托育之全日及夜間托育合計 ${c.longTotal} 人，超過至多2人。`);
  }else{
   if(c.shortTotal>4)add(`半日、日間、延長及臨時托育合計 ${c.shortTotal} 人，超過至多4人。`);
   if(c.shortU>2)add(`半日、日間、延長及臨時托育的未滿2歲兒童合計 ${c.shortU} 人，超過至多2人。`);
   if(c.longTotal>2)add(`全日及夜間托育合計 ${c.longTotal} 人，超過至多2人。`);
   if(c.totalU>2)add(`同一時段未滿2歲兒童合計 ${c.totalU} 人，不符合附表年齡組合限制。`);
   if(c.longTotal===1&&c.shortTotal>2)add(`已有1名全日或夜間托育兒童時，其他托育方式最多再收2人；目前為 ${c.shortTotal} 人。`);
   if(c.longTotal>=2){
    if(c.fullTotal>0&&c.shortTotal>0)add(`全日與夜間合計已達 ${c.longTotal} 人且包含全日托育，不得再同時收托其他方式兒童。`);
    else if(c.fullTotal===0&&c.shortTotal>c.nightO)add(`夜間托育共 ${c.nightTotal} 人時，可再收的其他方式人數最多為其中2歲以上夜間兒童人數 ${c.nightO} 人；目前另收 ${c.shortTotal} 人。`);
   }
  }
  const out=[];
  if(reasons.length){const summary=`<strong>填寫情形：</strong>${countEntrySummary(c)}<br><br><strong>不符合原因：</strong><br>${reasons.map((r,i)=>`${i+1}. ${r}`).join("<br>")}`;out.push(autoItem("收托人數組合不符第7條附表",summary,c.total));}
  if(model==="joint"&&(!qs("#mainCareAssigned")||!qs("#mainCareAssigned").checked)){
   const base=items.find(x=>x.id==="B08");if(base)out.push({...base,id:"auto_B08",summary:`<strong>填寫情形：</strong>${countEntrySummary(c)}<br><br>已選擇共同托育，但尚未確認是否為每名兒童分配主要照顧人。`});
  }
  return out;
 };

 penaltyFocus=function(it){
  if(it.neutral)return `<div class="legal-status review"><strong>判讀狀態：</strong>資料不足，暫不產生違法結論。</div>`;
  if(it.futureOnly)return `<div class="legal-status future-only"><strong>判讀狀態：</strong>本項僅為兒童托育服務法預覽，不列入現行罰鍰或處分。</div>`;
  const fk=fineKind(it);
  const fineText=fk==="direct"?(it.penalty||"有現行罰鍰"):(fk==="conditional"?`須先符合裁罰前提：${it.penalty||""}`:(fk==="fact_pending"?`須先查明事實：${it.penalty||""}`:(it.fine||"無直接罰鍰")));
  const revokeText=it.revoke||"否／須另確認";
  const publicText=publicImpactText(it);
  return `<div class="focus-box"><div class="focus-title">⚠️ 現行效果分流</div><div class="focus-grid">
   <div class="focus-item ${fk==="direct"?"focus-critical":(["conditional","fact_pending"].includes(fk)?"focus-conditional":"")}"><strong>行政罰／成立前提</strong>${highlightPenaltyText(fineText)}</div>
   <div class="focus-item ${(it.currentRevoke===true||it.revoke==="是")?"focus-critical":""}"><strong>行政處分</strong>${highlightPenaltyText(revokeText)}</div>
   <div class="focus-item ${it.publicStatus==="terminate_now"?"focus-critical":(["terminate_conditional","fact_pending"].includes(it.publicStatus)?"focus-conditional":"")}"><strong>準公共契約效果</strong>${highlightPenaltyText(publicText)}</div>
  </div></div>`;
 };

 generate=function(){
  const arr=getSelected(),r=qs("#result");r.style.display="block";
  if(!arr.length){r.innerHTML='<h2>尚未選擇</h2><div class="empty">請回前一步勾選細項或填入需判讀的收托人數。</div>';return;}
  let html=`<h2>✅ 已產生 ${arr.length} 項法規對照</h2><div class="version-note">法規核對日：民國115年7月22日。兒童托育服務法已於115年5月8日公布，但施行日期尚待行政院決定。</div>`;
  arr.forEach((it,idx)=>{
   const c=categories.find(x=>x.id===it.cat)||{title:"系統判斷"};
   html+=`<div class="rcard"><span class="tag">${c.title}</span>${it.futureOnly?'<span class="tag">新法預覽</span>':''}<h3>${idx+1}. ${it.title}</h3>`;
   if(!it.futureOnly){
    html+=`<div class="lawbox"><div class="lawbox-title">一、現行法規依據</div><div class="line"><strong>法規名稱／條號：</strong>${it.law}</div><div class="line">${articleSummary(it)}</div><div class="line"><strong>可能處理／效果：</strong>${highlightPenaltyText(it.effect||"")}</div><div class="line"><strong>現行罰則：</strong>${highlightPenaltyText(it.penalty||"無直接罰鍰")}</div></div>${penaltyFocus(it)}`;
    if(!it.neutral)html+=`<div class="flags">${flag("限期改善",it.improve)+flag("按次處罰",it.per)+flag("命停止服務",it.stop)+flag("強制轉介",it.transfer)}</div>`;
   }else html+=penaltyFocus(it);
   html+=`<div class="lawbox futurelaw"><div class="lawbox-title">二、兒童托育服務法（已公布、尚未施行）</div><div class="line">${futureText(it)}</div><div class="line"><strong>施行狀態：</strong>施行日期由行政院定之；施行前仍以現行法規處理。</div></div></div>`;
  });
  html+=`<div class="future"><strong>提醒：</strong>本工具用於法規對照與訪視輔助。涉及裁罰、停止服務、強制轉介、廢止登記或準公共終止契約時，仍須核對行為日期、證據、限期改善程序及主管機關認定。</div>
  <div class="source-links"><strong>官方核對來源：</strong><br>
   <a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=D0050001" target="_blank" rel="noreferrer">兒童及少年福利與權益保障法</a>｜
   <a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=D0050195" target="_blank" rel="noreferrer">居家式托育服務提供者登記及管理辦法</a>｜
   <a href="https://dowcd.tycg.gov.tw/News_Content.aspx?n=16424&s=1178268" target="_blank" rel="noreferrer">準公共服務作業要點114年7月16日版</a>｜
   <a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=D0050217" target="_blank" rel="noreferrer">兒童托育服務法</a>
  </div>`;
  r.innerHTML=html;
 };
})();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("/service-worker.js");
  });
}
