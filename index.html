<!doctype html><html lang="zh-Hant"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>托育工具箱</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.ico">
<style>
body{font-family:"Microsoft JhengHei",sans-serif;background:#f5ecdf;margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#fff;border-radius:20px;padding:28px;max-width:430px;width:90%;box-shadow:0 8px 24px rgba(0,0,0,.12)}
h1{text-align:center;color:#8b6a3f}.logo{text-align:center;font-size:56px}
input,button{width:100%;padding:14px;border-radius:12px;font-size:18px;margin-top:12px}
button{background:#9a7b4f;color:#fff;border:none;cursor:pointer}
.item{display:none;background:#faf7f2;padding:14px;border-radius:12px;margin-top:12px;text-decoration:none;color:#333}
</style></head><body><div class='card'>
<div class='logo'>🌱</div><h1>托育工具箱</h1>
<div id='login'>
<input id='pw' type='password' placeholder='請輸入密碼'>
<button onclick='go()'>進入工具</button></div>
<div id='menu'>
<a class='item' href='childcare-law/'>📖 托育法規工具</a>
<a class='item' href='age-tool/'>👶 幼兒年齡檢核工具</a>
</div>
<script>
function show(){login.style.display='none';document.querySelectorAll('.item').forEach(x=>x.style.display='block')}
if(localStorage.getItem('toolLoginUntil')>Date.now())show();
pw.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
function go(){if(pw.value==='3728'){localStorage.setItem('toolLoginUntil',Date.now()+30*24*60*60*1000);show();}else alert('密碼錯誤');}
</script></body></html>
