<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>托育工具箱</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">
  <meta name="theme-color" content="#9a7b4f">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      background: #f5ecdf;
      color: #3f3328;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 18px;
    }

    .shell {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .login-wrap {
      min-height: calc(100vh - 36px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: #fff;
      border-radius: 24px;
      padding: 30px 26px;
      box-shadow: 0 10px 30px rgba(80, 55, 30, .16);
      border: 1px solid rgba(154, 123, 79, .18);
    }

    .logo {
      width: 76px;
      height: 76px;
      margin: 0 auto 14px;
      border-radius: 24px;
      background: #f5ecdf;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 44px;
      box-shadow: inset 0 0 0 1px rgba(154,123,79,.18);
    }

    h1 {
      text-align: center;
      color: #8b6a3f;
      font-size: 28px;
      margin: 0 0 8px;
      letter-spacing: .04em;
    }

    .subtitle {
      text-align: center;
      color: #7a6b5b;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 22px;
    }

    .visitor-counter {
      margin-top: 18px;
      text-align: center;
      color: #8c7a64;
      font-size: 14px;
      line-height: 1.6;
    }

    .footer-counter {
      padding-top: 10px;
      border-top: 1px solid #eee3d2;
    }

    .visitor-counter strong {
      font-size: 16px;
      color: #7b5b32;
      font-weight: 800;
      margin: 0 4px;
    }

    .visitor-text {
      color: #8c7a64;
    }

    input, button {
      display: block;
      width: 100%;
      height: 52px;
      border-radius: 14px;
      font-size: 18px;
      font-family: inherit;
    }

    input {
      border: 1.5px solid #d8c7ae;
      padding: 0 16px;
      outline: none;
      background: #fffdf9;
      color: #3f3328;
      text-align: center;
      letter-spacing: .08em;
    }

    input:focus {
      border-color: #9a7b4f;
      box-shadow: 0 0 0 4px rgba(154, 123, 79, .12);
    }

    button {
      margin-top: 14px;
      background: #9a7b4f;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .04em;
    }

    button:active, .tool-card:active, .back-btn:active {
      transform: translateY(1px);
    }

    .error {
      display: none;
      margin-top: 10px;
      color: #b13b2e;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }

    .manual-update-box {
      width: 100%;
      max-width: 430px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(154, 123, 79, .24);
      border-radius: 15px;
      background: rgba(255, 250, 242, .94);
      box-shadow: 0 5px 16px rgba(80, 55, 30, .08);
      color: #6f5b43;
      font-size: 13px;
      font-weight: 700;
    }

    .manual-update-box button {
      flex: 0 0 auto;
      width: auto;
      min-width: 104px;
      height: 40px;
      margin: 0;
      padding: 0 13px;
      border-radius: 10px;
      font-size: 14px;
      white-space: nowrap;
    }

    .manual-update-box button:disabled {
      cursor: wait;
      opacity: .68;
    }

    @media(max-width:480px) {
      .manual-update-box {
        align-items: stretch;
        flex-direction: column;
        text-align: center;
      }

      .manual-update-box button {
        width: 100%;
      }
    }

    .shake {
      animation: shake .26s linear;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    #appView {
      display: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(245, 236, 223, .96);
      backdrop-filter: blur(10px);
      padding: 10px 0 14px;
    }

    .topbar-inner {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      color: #7b5b32;
      font-size: 22px;
      white-space: nowrap;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 4px 12px rgba(80, 55, 30, .10);
    }

    .back-btn {
      display: none;
      width: auto;
      min-width: 120px;
      height: 42px;
      padding: 0 14px;
      margin: 0;
      font-size: 15px;
      border-radius: 12px;
      background: #8b6a3f;
    }

    .menu-card {
      background: #fff;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 8px 22px rgba(80, 55, 30, .12);
      border: 1px solid rgba(154, 123, 79, .16);
    }

    .menu-title {
      color: #7b5b32;
      font-size: 24px;
      font-weight: 900;
      margin: 0 0 8px;
    }

    .menu-note {
      color: #7a6b5b;
      margin: 0 0 18px;
      line-height: 1.7;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }

    .tool-card {
      text-align: left;
      min-height: 118px;
      border: 1px solid #eadcc6;
      background: #fffdf8;
      color: #3f3328;
      margin: 0;
      padding: 18px;
      height: 100%;
      border-radius: 18px;
      box-shadow: 0 4px 12px rgba(80, 55, 30, .06);
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .tool-title {
      font-size: 20px;
      font-weight: 900;
      color: #7b5b32;
      margin-bottom: 8px;
    }

    .tool-desc {
      font-size: 15px;
      color: #7a6b5b;
      line-height: 1.55;
      font-weight: 500;
      letter-spacing: 0;
      flex: 1;
    }

    .tool-count {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid #eadcc6;
      color: #8c7a64;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 600;
      letter-spacing: 0;
    }

    .tool-count strong {
      color: #7b5b32;
      font-size: 14px;
      font-weight: 900;
      margin: 0 2px;
    }

    .tool-usage-counter {
      display: none;
      text-align: center;
      color: #8c7a64;
      font-size: 14px;
      line-height: 1.6;
      padding: 12px 14px 14px;
      border-top: 1px solid #eee3d2;
      background: #fffdf8;
    }

    .tool-usage-counter strong {
      font-size: 16px;
      color: #7b5b32;
      font-weight: 800;
      margin: 0 4px;
    }

    .tool-usage-name {
      color: #7b5b32;
      font-weight: 800;
      margin-right: 8px;
    }

    .tool-count strong {
      color: #7b5b32;
      font-size: 14px;
      font-weight: 900;
      margin: 0 2px;
    }

    #toolArea {
      display: none;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 22px rgba(80, 55, 30, .12);
      overflow: hidden;
      border: 1px solid rgba(154, 123, 79, .16);
    }

    #toolFrame {
      width: 100%;
      height: calc(100vh - 92px);
      min-height: 780px;
      border: 0;
      display: block;
      background: #fff;
    }

    .footer {
      text-align: center;
      color: #9b8b7b;
      font-size: 13px;
      margin-top: 18px;
    }


    @media (max-width: 600px) {
      .visitor-counter {
        font-size: 13px;
        margin-top: 16px;
      }

      .visitor-counter strong {
        font-size: 15px;
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 12px;
      }

      .login-wrap {
        min-height: calc(100vh - 24px);
      }

      .login-card {
        padding: 26px 20px;
        border-radius: 22px;
      }

      .topbar-inner {
        gap: 8px;
      }

      .brand {
        font-size: 19px;
      }

      .brand-icon {
        width: 38px;
        height: 38px;
      }

      .back-btn {
        min-width: 96px;
        height: 40px;
        font-size: 14px;
        padding: 0 10px;
      }

      .tool-grid {
        grid-template-columns: 1fr;
      }

      .tool-card {
        min-height: 0;
      }

      .menu-card {
        padding: 18px;
      }

      #toolFrame {
        height: calc(100vh - 122px);
        min-height: 590px;
      }
    }
  
    /* 手機 iframe 全寬修正 */
    @media (max-width: 760px) {
      .page {
        padding: 0 !important;
      }

      .shell {
        width: 100% !important;
        max-width: none !important;
      }

      .topbar {
        padding: 8px 10px 10px !important;
      }

      .topbar-inner {
        width: 100% !important;
        max-width: none !important;
      }

      #toolArea {
        width: 100% !important;
        border-radius: 0 !important;
        border: 0 !important;
        box-shadow: none !important;
      }

      #toolFrame {
        width: 100vw !important;
        height: calc(100vh - 112px) !important;
        min-height: calc(100vh - 112px) !important;
      }

      .tool-count {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #eadcc6;
      color: #8c7a64;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 600;
      letter-spacing: 0;
    }

    .tool-count strong {
      color: #7b5b32;
      font-size: 14px;
      font-weight: 900;
      margin: 0 2px;
    }

    .tool-usage-counter {
        font-size: 13px;
        padding: 10px 12px 12px;
      }

      .tool-usage-counter strong {
        font-size: 15px;
      }
    }
@media (max-width: 760px) {
      .page {
        padding: 0 !important;
      }

      .shell {
        width: 100% !important;
        max-width: none !important;
      }

      .topbar {
        padding: 8px 10px 10px !important;
      }

      .topbar-inner {
        width: 100% !important;
        max-width: none !important;
      }

      #toolArea {
        width: 100% !important;
        border-radius: 0 !important;
        border: 0 !important;
        box-shadow: none !important;
      }

      #toolFrame {
        width: 100vw !important;
        height: calc(100vh - 64px) !important;
        min-height: calc(100vh - 64px) !important;
      }
    }

    /* 權限顯示：預設先隱藏所有工具，登入後才依密碼顯示 */
    .tool-card {
      display: none;
    }

    body[data-role="basic"] .tool-card.basic-allowed {
      display: block;
    }

    body[data-role="admin"] .tool-card {
      display: block;
    }

    /* 一般密碼 0000：只顯示年齡工具，且框框縮到文字旁邊 */
    body[data-role="basic"] #menuArea {
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    body[data-role="basic"] .tool-grid {
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
    }

    body[data-role="basic"] .tool-card.basic-allowed {
      width: auto !important;
      min-width: 360px !important;
      max-width: 460px !important;
      min-height: auto !important;
      padding: 24px 28px !important;
    }

    @media (max-width: 760px) {
      body[data-role="basic"] #menuArea {
        max-width: none;
      }

      body[data-role="basic"] .tool-grid {
        display: block !important;
      }

      body[data-role="basic"] .tool-card.basic-allowed {
        width: 100% !important;
        min-width: 0 !important;
        max-width: none !important;
      }
    }

  
    /* 最終權限與人次顯示修正 */
    .tool-card {
      display: none;
    }

    body[data-role="basic"] .tool-card.basic-allowed {
      display: block !important;
    }

    body[data-role="admin"] .tool-card {
      display: block !important;
    }

    .tool-count {
      display: block !important;
      margin-top: 14px !important;
      color: #8c7a64 !important;
      font-size: 13px !important;
      line-height: 1.5 !important;
      font-weight: 600 !important;
      letter-spacing: 0 !important;
    }

    .tool-count strong {
      color: #7b5b32 !important;
      font-size: 14px !important;
      font-weight: 900 !important;
      margin: 0 2px !important;
    }

    body[data-role="basic"] #menuArea {
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    body[data-role="basic"] .tool-grid {
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
    }

    body[data-role="basic"] .tool-card.basic-allowed {
      width: auto !important;
      min-width: 360px !important;
      max-width: 460px !important;
      min-height: auto !important;
      padding: 24px 28px !important;
    }

    @media (max-width: 760px) {
      body[data-role="basic"] #menuArea {
        max-width: none;
      }

      body[data-role="basic"] .tool-grid {
        display: block !important;
      }

      body[data-role="basic"] .tool-card.basic-allowed {
        width: 100% !important;
        min-width: 0 !important;
        max-width: none !important;
      }
    }

  
    /* 工具卡片人次線固定到底部，對齊兩行描述高度 */
    body[data-role="basic"] .tool-card.basic-allowed,
    body[data-role="admin"] .tool-card {
      display: flex !important;
      flex-direction: column !important;
      justify-content: flex-start !important;
    }

    .tool-desc {
      min-height: 52px !important;
    }

    .tool-count {
      margin-top: auto !important;
      padding-top: 14px !important;
      border-top: 1px solid #eadcc6 !important;
    }

    @media (max-width: 760px) {
      .tool-desc {
        min-height: auto !important;
      }

      .tool-count {
        margin-top: 14px !important;
      }
    }

  
    .pwa-update-notice{
      position:fixed;
      left:50%;
      bottom:22px;
      z-index:9999;
      width:min(520px,calc(100% - 24px));
      transform:translateX(-50%);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:14px 16px;
      border:1px solid #cda873;
      border-radius:16px;
      background:#fffaf2;
      box-shadow:0 10px 28px rgba(70,45,20,.22);
      color:#5e4122;
      font-size:15px;
      font-weight:800;
    }

    .pwa-update-notice button{
      flex:0 0 auto;
      width:auto;
      height:42px;
      margin:0;
      padding:0 16px;
      border-radius:11px;
      background:#8b6a3f;
      color:#fff;
      font-size:15px;
      white-space:nowrap;
    }

    @media(max-width:600px){
      .pwa-update-notice{
        align-items:stretch;
        flex-direction:column;
      }

      .pwa-update-notice button{
        width:100%;
      }
    }

</style>
</head>

<body>
  <div class="page">
    <section id="loginView" class="login-wrap">
      <div class="login-card" id="loginCard">
        <div class="logo">🌱</div>
        <h1>托育工具箱</h1>
        <div class="subtitle">請輸入密碼後使用工具</div>

        <input id="passwordInput" type="password" inputmode="numeric" placeholder="請輸入密碼" autocomplete="off">
        <button type="button" onclick="login()">進入工具</button>
        <div class="error" id="errorMsg">密碼錯誤，請重新輸入</div>

      </div>

      <div class="manual-update-box" id="manualUpdateBox">
        <span id="manualUpdateStatus">可隨時檢查網站是否有新版</span>
        <button type="button" id="manualUpdateBtn" onclick="manualCheckForUpdate()">檢查更新</button>
      </div>
    </section>

    <section id="appView">
      <div class="topbar">
        <div class="topbar-inner">
          <div class="brand">
            <div class="brand-icon">🌱</div>
            <div>托育工具箱</div>
          </div>
          <button type="button" class="back-btn" id="backBtn" onclick="backToMenu()">返回首頁</button>
        </div>
      </div>

      <div class="shell">
        <div id="menuArea" class="menu-card">
          <div class="menu-title">請選擇工具</div>
          

          
          
          
          
          
          <div class="tool-grid">
            <button type="button" class="tool-card admin-only" onclick="openTool('childcare-law/')">
              <div class="tool-title">📖 托育法規工具</div>
              <div class="tool-desc">查詢托育法規、違規及罰則。</div>
              <div class="tool-count">已有 <strong id="count-childcare-law">讀取中</strong> 人次使用</div>
            </button>

            <button type="button" class="tool-card admin-only" onclick="openTool('childcare-case-library/')">
              <div class="tool-title">⚖️ 托育違規案例庫</div>
              <div class="tool-desc">依具體事件主題查詢法院判決、行政裁罰及事故案例。</div>
              <div class="tool-count">已有 <strong id="count-childcare-case-library">讀取中</strong> 人次使用</div>
            </button>

            <button type="button" class="tool-card basic-allowed admin-allowed" onclick="openTool('age-tool/')">
              <div class="tool-title">👶 幼兒年齡檢核工具</div>
              <div class="tool-desc">快速查詢幼兒年齡、月齡與發展階段。</div>
              <div class="tool-count">已有 <strong id="count-age-tool">讀取中</strong> 人次使用</div>
            </button>

            <button type="button" class="tool-card admin-only" onclick="openTool('report-date-tool/')">
              <div class="tool-title">📅 回報日期計算工具</div>
              <div class="tool-desc">計算新收托、結束收托、補助申請與準公共退出日期。</div>
              <div class="tool-count">已有 <strong id="count-report-date-tool">讀取中</strong> 人次使用</div>
            </button>

            <button type="button" class="tool-card admin-only" onclick="openTool('receipt-tool/')">
              <div class="tool-title">🧾 訊息生成器</div>
              <div class="tool-desc">產生收件、托育媒合及在職通知訊息。</div>
              <div class="tool-count">已有 <strong id="count-receipt-tool">讀取中</strong> 人次使用</div>
            </button>

            <button type="button" class="tool-card admin-only" onclick="openTool('report-generator/')">
              <div class="tool-title">📊 報表生成器</div>
              <div class="tool-desc">貼上 Excel 工作頁資料，自動整理並產生統計報表。</div>
              <div class="tool-count">已有 <strong id="count-report-generator">讀取中</strong> 人次使用</div>
            </button>

            <button type="button" class="tool-card admin-only" onclick="openTool('training-hours-tool/')">
              <div class="tool-title">📚 在職課程時數工具</div>
              <div class="tool-desc">依證書生效日產生年度區間，整理課程並匯出 Excel。</div>
              <div class="tool-count">已有 <strong id="count-training-hours-tool">讀取中</strong> 人次使用</div>
            </button>

          </div>


          <div class="footer">登入狀態僅保留於目前瀏覽器分頁；重新開啟後需重新輸入密碼。</div>
        </div>

        <div id="toolArea">
          <iframe id="toolFrame" title="托育工具"></iframe>
          <div class="tool-usage-counter" id="toolUsageCounter" aria-label="工具使用人次">
            <span class="tool-usage-name" id="toolUsageName">此工具</span>已有
            <strong id="toolUsageCount">讀取中</strong>
            <span>人次使用</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const loginView = document.getElementById("loginView");
    const appView = document.getElementById("appView");
    const passwordInput = document.getElementById("passwordInput");
    const errorMsg = document.getElementById("errorMsg");
    const loginCard = document.getElementById("loginCard");
    const menuArea = document.getElementById("menuArea");
    const toolArea = document.getElementById("toolArea");
    const toolFrame = document.getElementById("toolFrame");
    const backBtn = document.getElementById("backBtn");
    const visitorCount = document.getElementById("visitorCount");
    const toolUsageCounter = document.getElementById("toolUsageCounter");
    const toolUsageName = document.getElementById("toolUsageName");
    const toolUsageCount = document.getElementById("toolUsageCount");
    const manualUpdateStatus = document.getElementById("manualUpdateStatus");
    const manualUpdateBtn = document.getElementById("manualUpdateBtn");

    let currentPwaRegistration = null;
    const watchedPwaWorkers = new WeakSet();

    function setManualUpdateState(message, buttonText, disabled = false) {
      if (manualUpdateStatus) {
        manualUpdateStatus.textContent = message;
      }

      if (manualUpdateBtn) {
        manualUpdateBtn.textContent = buttonText;
        manualUpdateBtn.disabled = disabled;
      }
    }

    const toolPermissions = {
      "age-tool/": ["basic", "admin"],
      "childcare-law/": ["admin"],
      "childcare-case-library/": ["admin"],
      "report-date-tool/": ["admin"],
      "receipt-tool/": ["admin"],
      "report-generator/": ["admin"],
      "training-hours-tool/": ["admin"]
    };

    const counterMap = {
      "childcare-law/": {
        counter: "childcare_law",
        name: "托育法規工具",
        cardId: "count-childcare-law"
      },
      "childcare-case-library/": {
        counter: "childcare_case_library",
        name: "托育違規案例庫",
        cardId: "count-childcare-case-library"
      },
      "age-tool/": {
        counter: "age_tool",
        name: "幼兒年齡檢核工具",
        cardId: "count-age-tool"
      },
      "report-date-tool/": {
        counter: "report_date_tool",
        name: "回報日期計算工具",
        cardId: "count-report-date-tool"
      },
      "receipt-tool/": {
        counter: "receipt_tool",
        name: "訊息生成器",
        cardId: "count-receipt-tool"
      },
      "report-generator/": {
        counter: "report_generator",
        name: "報表生成器",
        cardId: "count-report-generator"
      },
      "training-hours-tool/": {
        counter: "training_hours_tool",
        name: "在職課程時數工具",
        cardId: "count-training-hours-tool"
      }
    };

    async function fetchCounter(counter, increment) {
      const url = "/api/view-counter?counter=" + encodeURIComponent(counter);

      const options = increment
        ? {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ counter: counter }),
            cache: "no-store"
          }
        : {
            method: "GET",
            cache: "no-store"
          };

      const res = await fetch(url, options);
      if (!res.ok) throw new Error("counter error");
      return await res.json();
    }

    async function loadHomeCounter() {
      if (!visitorCount) return;
      try {
        const data = await fetchCounter("home", true);
        visitorCount.textContent = Number(data.count || 0).toLocaleString("zh-TW");
      } catch (e) {
        visitorCount.textContent = "讀取失敗";
      }
    }

    async function loadVisibleToolCounters() {
      const role = sessionStorage.getItem("toolRole");

      for (const path of Object.keys(counterMap)) {
        const allowedRoles = toolPermissions[path] || [];
        const cfg = counterMap[path];
        const el = document.getElementById(cfg.cardId);

        if (!el) continue;
        if (!allowedRoles.includes(role)) continue;

        try {
          const data = await fetchCounter(cfg.counter, false);
          el.textContent = Number(data.count || 0).toLocaleString("zh-TW");
        } catch (e) {
          el.textContent = "讀取失敗";
        }
      }
    }

    async function loadToolUsage(path) {
      const cfg = counterMap[path];
      if (!cfg || !toolUsageCounter || !toolUsageName || !toolUsageCount) return;

      toolUsageName.textContent = cfg.name;
      toolUsageCount.textContent = "讀取中";
      toolUsageCounter.style.display = "block";

      try {
        const data = await fetchCounter(cfg.counter, true);
        const countText = Number(data.count || 0).toLocaleString("zh-TW");
        toolUsageCount.textContent = countText;

        const cardEl = document.getElementById(cfg.cardId);
        if (cardEl) cardEl.textContent = countText;
      } catch (e) {
        toolUsageCount.textContent = "讀取失敗";
      }
    }

    function showApp(role) {
      document.body.dataset.role = role;
      loginView.style.display = "none";
      appView.style.display = "block";
      menuArea.style.display = "block";
      toolArea.style.display = "none";
      backBtn.style.display = "none";
      toolFrame.removeAttribute("src");

      if (toolUsageCounter) {
        toolUsageCounter.style.display = "none";
      }

      setTimeout(loadVisibleToolCounters, 0);
    }

    async function login() {
      const value = passwordInput.value.trim();

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: value })
        });

        const data = await res.json().catch(function () {
          return { ok: false, message: "後端回應格式錯誤" };
        });

        if (res.ok && data.ok && data.role) {
          sessionStorage.setItem("toolLogin", "ok");
          sessionStorage.setItem("toolRole", data.role);
          showApp(data.role);
          return;
        }

        showLoginError(data.message || "密碼錯誤");
      } catch (e) {
        showLoginError("無法連線到後端登入功能，請確認 Cloudflare Pages Functions 已啟用。");
      }
    }

    function showLoginError(message) {
      sessionStorage.removeItem("toolLogin");
      sessionStorage.removeItem("toolRole");
      delete document.body.dataset.role;
      errorMsg.textContent = message || "密碼錯誤，請重新輸入";
      errorMsg.style.display = "block";
      passwordInput.value = "";
      passwordInput.focus();

      loginCard.classList.remove("shake");
      void loginCard.offsetWidth;
      loginCard.classList.add("shake");
    }

    function openTool(path) {
      const role = sessionStorage.getItem("toolRole");
      const allowedRoles = toolPermissions[path] || [];

      if (sessionStorage.getItem("toolLogin") !== "ok" || !allowedRoles.includes(role)) {
        alert("此密碼無法使用這個工具。");
        backToMenu();
        return;
      }

      menuArea.style.display = "none";
      toolArea.style.display = "block";
      backBtn.style.display = "block";
      toolFrame.src = path;
      loadToolUsage(path);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function backToMenu() {
      const role = sessionStorage.getItem("toolRole");
      toolFrame.removeAttribute("src");
      toolArea.style.display = "none";
      menuArea.style.display = "block";
      backBtn.style.display = "none";
      if (toolUsageCounter) {
        toolUsageCounter.style.display = "none";
      }
      if (role) {
        document.body.dataset.role = role;
        setTimeout(loadVisibleToolCounters, 0);
      }
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    passwordInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") login();
    });

    window.addEventListener("DOMContentLoaded", async function () {
      sessionStorage.removeItem("toolLogin");
      sessionStorage.removeItem("toolRole");
      delete document.body.dataset.role;

      try {
        await fetch("/api/logout", { method: "POST" });
      } catch (e) {}

      loadHomeCounter();
      passwordInput.focus();
    });

    function activatePwaUpdate(registration) {
      const waitingWorker =
        registration?.waiting;

      if (waitingWorker) {
        setManualUpdateState(
          "正在套用新版本…",
          "更新中…",
          true
        );

        waitingWorker.postMessage({
          type: "SKIP_WAITING"
        });
      } else {
        location.reload();
      }
    }

    function watchInstallingWorker(registration) {
      const worker =
        registration.installing;

      if (!worker) {
        return false;
      }

      if (watchedPwaWorkers.has(worker)) {
        return true;
      }

      watchedPwaWorkers.add(worker);

      setManualUpdateState(
        "已找到新版，正在準備更新…",
        "準備中…",
        true
      );

      worker.addEventListener("statechange", function () {
        if (
          worker.state === "installed"
        ) {
          if (navigator.serviceWorker.controller) {
            showPwaUpdateNotice(registration);
          } else {
            setManualUpdateState(
              "更新功能已準備完成",
              "檢查更新",
              false
            );
          }
        } else if (worker.state === "redundant") {
          setManualUpdateState(
            "更新未完成，請重新檢查",
            "重新檢查",
            false
          );
        }
      });

      return true;
    }

    async function manualCheckForUpdate() {
      if (!("serviceWorker" in navigator)) {
        setManualUpdateState(
          "此瀏覽器不支援自動更新",
          "無法檢查",
          true
        );
        return;
      }

      try {
        const registration =
          currentPwaRegistration ||
          await navigator.serviceWorker.getRegistration();

        if (!registration) {
          setManualUpdateState(
            "更新功能尚未就緒，請稍後再試",
            "重新檢查",
            false
          );
          return;
        }

        currentPwaRegistration = registration;

        if (registration.waiting) {
          activatePwaUpdate(registration);
          return;
        }

        setManualUpdateState(
          "正在檢查網站版本…",
          "檢查中…",
          true
        );

        await registration.update();

        if (registration.waiting) {
          showPwaUpdateNotice(registration);
        } else if (!watchInstallingWorker(registration)) {
          setManualUpdateState(
            "目前已是最新版本",
            "再次檢查",
            false
          );
        }
      } catch (error) {
        setManualUpdateState(
          "檢查失敗，請確認網路後再試",
          "重新檢查",
          false
        );
      }
    }

    function showPwaUpdateNotice(registration) {
      currentPwaRegistration = registration;
      setManualUpdateState(
        "網站有新版本可更新",
        "立即更新",
        false
      );

      if (document.getElementById("pwaUpdateNotice")) return;

      const notice = document.createElement("div");
      notice.id = "pwaUpdateNotice";
      notice.className = "pwa-update-notice";
      notice.innerHTML = `
        <span>網站有新版本，請更新後再使用。</span>
        <button type="button" id="pwaUpdateBtn">立即更新</button>
      `;
      document.body.appendChild(notice);

      document.getElementById("pwaUpdateBtn").addEventListener("click", function () {
        const button = this;
        button.disabled = true;
        button.textContent = "更新中…";

        activatePwaUpdate(registration);
      });
    }

    if ("serviceWorker" in navigator) {
      let reloadingForUpdate = false;

      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (reloadingForUpdate) return;
        reloadingForUpdate = true;
        location.reload();
      });

      window.addEventListener("load", function () {
        navigator.serviceWorker.register("service-worker.js", {
          updateViaCache: "none"
        }).then(function (registration) {
          currentPwaRegistration = registration;
          registration.update();

          if (registration.waiting && navigator.serviceWorker.controller) {
            showPwaUpdateNotice(registration);
          }

          registration.addEventListener("updatefound", function () {
            watchInstallingWorker(registration);
          });
        }).catch(function () {
          setManualUpdateState(
            "更新功能載入失敗",
            "重新檢查",
            false
          );
        });
      });
    }
  </script>
</body>
</html>
